function spawnSmoke(x, y, n) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x: x + (Math.random() - 0.5) * 30,
      y: y + (Math.random() - 0.5) * 20,
      vx: (Math.random() - 0.5) * 3,
      vy: -Math.random() * 2 - 0.5,
      life: 30 + Math.random() * 20,
      color: "#e8e8f0",
      size: 8 + Math.random() * 8,
      smoke: true,
    });
  }
}

function damageDummy(amount) {
  if (matchEnded) return;
  // PVP 时目标如果有无敌/盾，也走减伤流程
  if (!dummy.isDummy) {
    if (performance.now() < dummy.invincibleUntil) return;
    if (performance.now() < p2ShieldUntil) {
      amount = Math.max(1, Math.ceil(amount * 0.1));
      damageTexts.push({
        x: p2.x, y: p2.y - 90,
        vx: (Math.random() - 0.5) * 2, vy: -3,
        life: 45, maxLife: 45,
        text: "-90%", color: "#66ff99", size: 20, crit: false,
      });
    }
  }
  dummy.hp = Math.max(0, dummy.hp - amount);
  dummy.hitFlash = 10;
  dummy.shakeT = 12;
  document.getElementById("hp2").style.width = (dummy.hp / dummy.maxHp * 100) + "%";
  document.getElementById("hpnum2").textContent = `${dummy.hp} / ${dummy.maxHp}`;
  spawnParticles(dummy.x, dummy.y - 50, "#f55", 14);
  spawnDamageText(dummy.x + (Math.random() - 0.5) * 30, dummy.y - 90, amount);
  // 仅训练模式：木桩血归零自动回满
  if (dummy.hp === 0 && dummy.isDummy) setTimeout(() => {
    dummy.hp = dummy.maxHp;
    document.getElementById("hp2").style.width = "100%";
    document.getElementById("hpnum2").textContent = `${dummy.maxHp} / ${dummy.maxHp}`;
  }, 800);
  // PVP: P2 倒下 → 判 P1 胜
  if (!dummy.isDummy && dummy.hp === 0) checkMatchEnd();
}

function checkMatchEnd() {
  if (matchEnded || gameMode !== "pvp") return;
  if (player.hp <= 0) { matchEnded = true; winner = "p2"; p2Wins++; }
  else if (p2.hp <= 0) { matchEnded = true; winner = "p1"; p1Wins++; }
  else return;
  updateWinPips();
  if (p1Wins >= WINS_TO_WIN || p2Wins >= WINS_TO_WIN) {
    showSeriesEnd();
  } else {
    showRoundEnd();
  }
}

function showRoundEnd() {
  const overlay = document.getElementById("matchOverlay");
  const title = document.getElementById("matchTitle");
  const sub = document.getElementById("matchSub");
  const buttons = document.querySelector('.match-buttons');
  buttons.style.display = 'none';   // 局间不出按钮
  title.textContent = winner === "p1" ? "P1 拿 下 本 局" : "P2 拿 下 本 局";
  sub.textContent = `比 分 ${p1Wins} : ${p2Wins}　·　3 秒 后 进 入 下 一 局`;
  overlay.className = "overlay " + (winner === "p1" ? "win-p1" : "win-p2");
  overlay.classList.remove("hidden");
  clearTimeout(roundTimeoutId);
  roundTimeoutId = setTimeout(() => {
    overlay.classList.add("hidden");
    buttons.style.display = '';
    resetRound();
  }, 3000);
}

function showSeriesEnd() {
  const overlay = document.getElementById("matchOverlay");
  const title = document.getElementById("matchTitle");
  const sub = document.getElementById("matchSub");
  const buttons = document.querySelector('.match-buttons');
  buttons.style.display = '';
  if (winner === "p1") {
    title.textContent = "P1 总 决 胜!";
    sub.textContent = `${p1Wins} : ${p2Wins}　·　鸣 人 三 局 两 胜`;
    overlay.className = "overlay win-p1";
  } else {
    title.textContent = "P2 总 决 胜!";
    sub.textContent = `${p1Wins} : ${p2Wins}　·　哆 啦 A 梦 三 局 两 胜`;
    overlay.className = "overlay win-p2";
  }
  overlay.classList.remove("hidden");
}

function resetRound() {
  matchEnded = false;
  winner = null;
  // 位置 + HP + 计时器归零（保留胜场数）
  p2.hp = p2.maxHp;
  p2.x = 760; p2.y = GROUND; p2.vx = 0; p2.vy = 0;
  p2.facing = -1;
  p2.atkT = 0; p2.atkHit = false; p2.atkType = 0;
  p2.stunT = 0; p2.downT = 0; p2.hitFlash = 0;
  p2.invincibleUntil = 0; p2.flashlightEnd = 0;
  p2.skills = skillConfigs[p2.char].map(c => ({ ...c, ready: 0 }));
  p2ShieldUntil = 0;
  p1FrozenUntil = 0;
  timeFrozenUntil = 0;
  shieldActiveUntil = 0;
  player.hp = player.maxHp;
  player.x = 200; player.y = GROUND; player.vx = 0; player.vy = 0;
  player.facing = 1;
  player.atkT = 0; player.atkType = 0; player.atkHit = false;
  player.stunT = 0; player.downT = 0;
  player.invincibleUntil = 0;
  player.rasenCharging = false; player.rasenThrowT = 0;
  player.aerialStart = 0; player.sealT = 0;
  player.flashlightEnd = 0;
  player.comboStage = 0; player.comboWindow = 0;
  skills.forEach(s => s.ready = 0);
  clones.length = 0;
  rasenBalls.length = 0;
  projectiles.length = 0;
  fogClouds.length = 0;
  doors.length = 0;
  document.getElementById("hp1").style.width = "100%";
  document.getElementById("hpnum1").textContent = `${player.maxHp} / ${player.maxHp}`;
  document.getElementById("hp2").style.width = "100%";
  document.getElementById("hpnum2").textContent = `${p2.maxHp} / ${p2.maxHp}`;
}

function updateSkillBarKeys() {
  const labels = gameMode === "pvp" ? ["1","2","3","4"] : ["J","K","L","U"];
  document.querySelectorAll(".skill").forEach((el, i) => {
    const keyEl = el.querySelector(".key");
    if (keyEl) keyEl.textContent = labels[i];
  });
}

function updateHint() {
  const hintEl = document.getElementById("hint");
  if (!hintEl) return;
  if (gameMode === "pvp") {
    hintEl.innerHTML = `<b style="color:#ff8a30">P1</b>: A/D 移 · W 跳 · Space 平A · <b>1/2/3/4 技能</b>　｜　<b style="color:#4cc8ff">P2</b>: ← → 移 · ↑ 跳 · ↓ 普攻 · <b>J/K/I/L 技能</b>`;
  } else {
    hintEl.innerHTML = `A / D 移动 · W 跳跃 · <b style="color:#ffdd55">Space 平A</b> · <b>J K L U 技能</b>`;
  }
}

function updateWinPips() {
  const pipsHtml = (wins) => {
    let html = '';
    for (let i = 0; i < WINS_TO_WIN; i++) {
      const filled = i < wins;
      const color = filled ? '#ffdd55' : 'rgba(255,255,255,0.28)';
      const shadow = filled ? 'text-shadow:0 0 6px #ffdd55;' : '';
      html += `<span style="color:${color};margin-left:5px;font-size:15px;${shadow}">●</span>`;
    }
    return html;
  };
  const p1NameEl = document.querySelector('.hpbar.left .name > span');
  const p2NameEl = document.querySelector('.hpbar.right .name > span');
  const p1Name = selectedChar === "naruto" ? "鸣 人" : "哆 啦 A 梦";
  if (gameMode === "pvp") {
    p1NameEl.innerHTML = p1Name + pipsHtml(p1Wins);
    const p2Name = p2.char === "doraemon" ? "哆 啦 A 梦" : "鸣 人";
    p2NameEl.innerHTML = p2Name + pipsHtml(p2Wins);
  } else {
    p1NameEl.textContent = p1Name;
    p2NameEl.textContent = "木 桩";
  }
}

function spawnDamageText(x, y, amount) {
  // 根据伤害大小选颜色：小=白 中=黄 大=红
  const color = amount >= 2000 ? "#ff3355" : amount >= 1000 ? "#ffdd33" : "#ffffff";
  const size  = amount >= 2000 ? 32       : amount >= 1000 ? 26       : 20;
  damageTexts.push({
    x, y,
    vx: (Math.random() - 0.5) * 2,
    vy: -3,
    life: 50,
    maxLife: 50,
    text: String(amount),
    color,
    size,
    crit: amount >= 2000,
  });
}

function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8 - 2,
      life: 20 + Math.random() * 20,
      color,
      size: 2 + Math.random() * 3,
    });
  }
}

function flashSkill(idx, success) {
  const el = document.querySelectorAll(".skill")[idx];
  if (success) {
    el.classList.remove("flash");
    void el.offsetWidth;
    el.classList.add("flash");
  } else {
    // CD 中按了 → 抖一下
    el.style.transform = "translateX(-3px)";
    setTimeout(() => el.style.transform = "translateX(3px)", 40);
    setTimeout(() => el.style.transform = "", 80);
  }
}

function update() {
  if (hitStopT > 0) { hitStopT--; return; }
  if (shakeT > 0) shakeT--;
  // 玩家移动
  const speed = inAerial() ? 5 : 4;
  if (player.rasenDashT > 0) {
    // 螺旋丸前冲（锁定方向）
    player.vx = player.facing * 5.5;
    player.rasenDashT--;
    if (keys["a"]) player.facing = -1;
    else if (keys["d"]) player.facing = 1;
  } else if (keys["a"]) { player.vx = -speed; player.facing = -1; }
  else if (keys["d"]) { player.vx = speed; player.facing = 1; }
  else player.vx = 0;

  if (keys["w"] && player.onGround) {
    player.vy = -14;
    player.onGround = false;
  }

  player.x += player.vx;
  player.y += player.vy;
  player.vy += GRAVITY;

  // 飞天悬浮：锁定高度
  if (inAerial()) {
    const target = 180;
    const dy = target - player.y;
    player.vy = dy * 0.08 + Math.sin(performance.now() / 400) * 0.6;
    player.onGround = false;
  } else if (player.aerialStart > 0) {
    // 飞天结束
    player.aerialStart = 0;
    player.aerialShotsLeft = 0;
  }

  if (player.y >= GROUND) {
    player.y = GROUND;
    player.vy = 0;
    player.onGround = true;
  }
  player.x = Math.max(30, Math.min(W - 30, player.x));

  // 走路相位
  if (Math.abs(player.vx) > 0.1 && player.onGround) {
    player.walkT += 0.22;
  }
  // 落地挤压
  if (!player.wasOnGround && player.onGround) {
    player.landT = 8;
  }
  if (player.landT > 0) player.landT--;
  player.wasOnGround = player.onGround;
  // 眨眼：每 ~3s 眨一下
  player.blinkT = (player.blinkT + 1) % 180;

  if (player.slashT > 0) player.slashT--;
  if (player.teleportT > 0) player.teleportT--;
  if (player.sealT > 0) player.sealT--;
  if (player.rasenThrowT > 0) player.rasenThrowT--;

  // 螺旋丸充能
  if (player.rasenCharging) {
    player.rasenChargeT++;
    if (player.rasenChargeT >= LONG_PRESS_THRESHOLD) {
      fireAerialRasen();
    }
  }

  // 飞天阶段发射由玩家按空格触发 fireManualAerialShot()

  // 螺旋丸球物理
  for (let i = rasenBalls.length - 1; i >= 0; i--) {
    const b = rasenBalls[i];
    b.x += b.vx;
    b.y += b.vy;
    b.travel += Math.hypot(b.vx, b.vy);
    b.size = Math.min(30, 8 + b.travel * 0.05);
    // 命中木桩
    const dx = dummy.x - b.x;
    const dy = (dummy.y - 50) - b.y;
    if (Math.abs(dx) < b.size + 28 && Math.abs(dy) < 60) {
      const base = 1500 + b.travel * 8;
      const dmg = Math.max(1, Math.round(base * (b.scale || 1)));
      damageDummy(dmg);
      spawnRasenExplosion(b.x, b.y);
      rasenBalls.splice(i, 1);
      continue;
    }
    // 触地/越界/超距
    if (b.y > GROUND - 8 || b.x < 0 || b.x > W || b.travel > b.maxTravel) {
      spawnRasenExplosion(b.x, b.y);
      rasenBalls.splice(i, 1);
    }
  }

  // 统一战斗管线：P1 打 dummy；PVP 时 P2 也打 player
  updateEntityCombat(player, dummy, selectedChar);
  if (gameMode === "pvp") {
    updateEntityCombat(p2, player, p2.char);
  }
  // atkT/combo/spear/spin/flip 全部由 updateEntityCombat() 处理

  // 手里剑
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx;
    p.rot += 0.4;
    p.life--;
    // 碰到木桩
    if (Math.abs(p.x - dummy.x) < 40 && Math.abs(p.y - (dummy.y - 50)) < 60) {
      damageDummy(p.damage || 10);
      projectiles.splice(i, 1);
      continue;
    }
    if (p.life <= 0 || p.x < 0 || p.x > W) projectiles.splice(i, 1);
  }

  // 影分身（持续 5s，两侧跟随，同步攻击 50% 伤害）
  const nowMs = performance.now();
  for (let i = clones.length - 1; i >= 0; i--) {
    const c = clones[i];
    const elapsed = nowMs - c.spawnTime;
    if (c.spawnT > 0) c.spawnT--;
    // 朝目标位置软跟随
    const targetX = player.x + c.side * 70;
    const prevX = c.x;
    c.x += (targetX - c.x) * 0.12;
    c.vx = c.x - prevX;
    c.y = player.y;
    c.facing = player.facing;
    c.onGround = true;
    // 走路相位随速度累积
    if (Math.abs(c.vx) > 0.15) c.walkT += 0.22;
    c.blinkT = (c.blinkT + 1) % 180;
    if (c.flipT > 0) c.flipT--;
    // 命中判定（平A 50% 伤害）
    if (c.atkT > 0 && !c.atkHit) {
      const dx = dummy.x - c.x;
      const sameSide = Math.sign(dx) === c.facing;
      if (c.atkType === 1 && Math.abs(dx) < 110 && sameSide) { damageDummy(250); c.atkHit = true; }
      else if (c.atkType === 2 && Math.abs(dx) < 110 && sameSide) { damageDummy(400); c.atkHit = true; }
      else if (c.atkType === 3 && Math.abs(dx) < 100) { damageDummy(350); c.atkHit = true; }
    }
    if (c.atkT > 0) c.atkT--;
    if (c.atkT === 0) c.atkType = 0;
    if (c.rasenThrowT > 0) c.rasenThrowT--;
    // 消散（时间到）
    if (elapsed >= c.lifeMs) {
      spawnSmoke(c.x, c.y - 40, 14);
      clones.splice(i, 1);
    }
  }

  // 粒子
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    if (p.smoke) {
      p.vy *= 0.94;
      p.size += 0.3;
    } else {
      p.vy += 0.2;
    }
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // 飘字伤害
  for (let i = damageTexts.length - 1; i >= 0; i--) {
    const d = damageTexts[i];
    d.x += d.vx;
    d.y += d.vy;
    d.vy += 0.15;
    d.life--;
    if (d.life <= 0) damageTexts.splice(i, 1);
  }

  // 木桩/P2 状态衰减
  if (dummy.shakeT > 0) dummy.shakeT--;
  if (dummy.hitFlash > 0) dummy.hitFlash--;
  if (dummy.stunT > 0) dummy.stunT--;
  if (dummy.downT > 0) dummy.downT--;

  // === PVP: 玩家 2 操作 / 物理 / 攻击 ===
  if (gameMode === "pvp") {
    // 被时空暂停或被眩晕/倒地时禁止操作
    const frozen = isOpponentFrozen() || p2.stunT > 0 || p2.downT > 0;
    if (!frozen) {
      if (keys["arrowleft"])  { p2.vx = -4; p2.facing = -1; }
      else if (keys["arrowright"]) { p2.vx = 4; p2.facing = 1; }
      else p2.vx = 0;
      if (keys["arrowup"] && p2.onGround) {
        p2.vy = -14;
        p2.onGround = false;
      }
    } else {
      p2.vx = 0;
    }
    p2.x += p2.vx;
    p2.y += p2.vy;
    p2.vy += GRAVITY;
    if (p2.y >= GROUND) { p2.y = GROUND; p2.vy = 0; p2.onGround = true; }
    p2.x = Math.max(30, Math.min(W - 30, p2.x));
    if (Math.abs(p2.vx) > 0.1 && p2.onGround) p2.walkT += 0.22;
    if (!p2.wasOnGround && p2.onGround) p2.landT = 8;
    if (p2.landT > 0) p2.landT--;
    p2.wasOnGround = p2.onGround;
    p2.blinkT = (p2.blinkT + 1) % 180;
    // P2 平A 命中/combo/计时器 由 updateEntityCombat(p2, player, p2.char) 统一处理

    // P2 手电筒持续伤害
    if (performance.now() < p2.flashlightEnd) {
      const dx = player.x - p2.x;
      const dy = (player.y - 50) - (p2.y - 40);
      if (Math.sign(dx) === p2.facing && Math.abs(dx) < 390 && Math.abs(dy) < 110) {
        const now = performance.now();
        if (now - (p2.flashlightLastTick || 0) >= 20) {
          damagePlayer(40);
          p2.flashlightLastTick = now;
          player.downT = 30;
        }
      }
    }
  }

  // 手电筒持续伤害（范围 +50%：横向 390 / 纵向 ±110）
  if (performance.now() < player.flashlightEnd) {
    const dx = dummy.x - player.x;
    const dy = (dummy.y - 50) - (player.y - 40);
    if (Math.sign(dx) === player.facing && Math.abs(dx) < 390 && Math.abs(dy) < 110) {
      const now = performance.now();
      if (now - (player.flashlightLastTick || 0) >= 20) {
        damageDummy(40);
        player.flashlightLastTick = now;
        dummy.downT = 30;  // 命中期间一直刷新倒地（离开后 0.5s 缓冲）
      }
    }
    // 持续光束粒子
    if (Math.random() < 0.5) {
      spawnParticles(
        player.x + player.facing * (60 + Math.random() * 320),
        player.y - 40 + (Math.random() - 0.5) * 80,
        "#ffee80", 1
      );
    }
  }

  // 色诱云雾：存续 + 扩散 + 持续喷雾
  for (let i = fogClouds.length - 1; i >= 0; i--) {
    const f = fogClouds[i];
    f.life--;
    if (f.radius < f.maxRadius) f.radius += 0.8;
    // 持续冒烟保持朦胧感
    if (f.life % 3 === 0) {
      const ang = Math.random() * Math.PI * 2;
      const dist = Math.random() * f.radius * 0.7;
      particles.push({
        x: f.x + Math.cos(ang) * dist,
        y: f.y + Math.sin(ang) * dist * 0.6,
        vx: Math.cos(ang) * 0.6,
        vy: -0.3 - Math.random() * 0.5,
        life: 30 + Math.random() * 20,
        color: "#ffaacc",
        size: 8 + Math.random() * 6,
        smoke: true,
      });
    }
    // 木桩碰到 → 眩晕 + CD 惩罚 + 伤害 500（一次性）
    const dx = dummy.x - f.x;
    const dy = (dummy.y - 50) - f.y;
    if (Math.abs(dx) < f.radius && Math.abs(dy) < f.radius * 0.8) {
      const stunFrames = clones.length > 0 ? 120 : 60;  // 有影分身时眩晕 +1s
      dummy.stunT = Math.max(dummy.stunT, stunFrames);
      if (!f.hit.has("dummy")) {
        dummy.cdPenalty += 2000;
        damageDummy(500);
        f.hit.add("dummy");
      }
    }
    if (f.life <= 0) fogClouds.splice(i, 1);
  }

  // CD 显示
  const now = performance.now();
  document.querySelectorAll(".skill").forEach((el, idx) => {
    const remain = skills[idx].ready - now;
    const mask = el.querySelector(".cd-mask");
    if (remain > 0) {
      el.classList.add("cooling");
      el.classList.remove("ready");
      mask.textContent = (remain / 1000).toFixed(1);
    } else {
      el.classList.remove("cooling");
      el.classList.add("ready");
      mask.textContent = "";
    }
  });
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  if (shakeT > 0) {
    const s = shakeStrength * (shakeT / 12);
    ctx.translate((Math.random() - 0.5) * s * 2, (Math.random() - 0.5) * s * 2);
  }

  // 地面
  ctx.fillStyle = "#1a0a2e";
  ctx.fillRect(0, GROUND, W, H - GROUND);
  ctx.strokeStyle = "#5a3aff";
  ctx.beginPath();
  ctx.moveTo(0, GROUND);
  ctx.lineTo(W, GROUND);
  ctx.stroke();

  // 远景装饰：灯笼
  for (let i = 0; i < 5; i++) {
    const lx = 100 + i * 180;
    ctx.fillStyle = "rgba(255, 100, 80, 0.35)";
    ctx.beginPath();
    ctx.arc(lx, 80 + Math.sin(performance.now() / 500 + i) * 4, 16, 0, Math.PI * 2);
    ctx.fill();
  }

  // 色诱云雾（地面粉色雾区，位于角色之下层）
  fogClouds.forEach(f => {
    const a = Math.min(0.45, f.life / f.maxLife * 0.5);
    const grad = ctx.createRadialGradient(f.x, f.y, 10, f.x, f.y, f.radius);
    grad.addColorStop(0, `rgba(255,180,220,${a * 1.2})`);
    grad.addColorStop(1, `rgba(255,150,200,0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(f.x, f.y, f.radius, f.radius * 0.7, 0, 0, Math.PI * 2);
    ctx.fill();
    // 小桃心随机飘
    for (let i = 0; i < 3; i++) {
      const t = performance.now() / 400 + i * 2;
      const hx = f.x + Math.cos(t) * f.radius * 0.5;
      const hy = f.y + Math.sin(t * 1.3) * f.radius * 0.3 - 10;
      ctx.globalAlpha = a * 2;
      ctx.fillStyle = "#ff4488";
      ctx.font = "14px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("♥", hx, hy);
    }
    ctx.globalAlpha = 1;
  });

  // 影分身（半透明，入场/消散淡出）
  const drawNow = performance.now();
  clones.forEach(c => {
    const elapsed = drawNow - c.spawnTime;
    const remaining = c.lifeMs - elapsed;
    const spawnA = c.spawnT > 0 ? 1 - c.spawnT / 18 : 1;
    const fadeA = remaining < 500 ? remaining / 500 : 1;
    ctx.globalAlpha = 0.7 * Math.min(spawnA, fadeA);
    drawNinja(c.x, c.y, c.facing, c.atkT > 0 || c.rasenThrowT > 0, undefined, c);
    ctx.globalAlpha = 1;
  });

  // 瞬移残影
  if (player.teleportT > 0) {
    ctx.globalAlpha = player.teleportT / 20 * 0.5;
    drawNinja(player.teleportFromX, player.y, player.facing, false, "#a0f");
    ctx.globalAlpha = 1;
  }

  // 飞天预瞄线
  if (inAerial() && player.aerialShotsLeft > 0) {
    const startX = player.x + player.facing * 10;
    const startY = player.y - 30;
    const { vx, vy } = computeAerialShotVel();
    // 预测触地/最远点
    const tGround = vy > 0 ? (GROUND - startY) / vy : Infinity;
    const speed = Math.hypot(vx, vy);
    const tMax = 620 / speed;
    const t = Math.min(tGround, tMax);
    const endX = startX + vx * t;
    const endY = Math.min(GROUND, startY + vy * t);
    // 虚线
    ctx.save();
    ctx.setLineDash([6, 5]);
    ctx.strokeStyle = "rgba(130,220,255,0.7)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(endX, endY);
    ctx.stroke();
    ctx.setLineDash([]);
    // 着弹点圆圈 + 十字
    const pulse = 1 + Math.sin(performance.now() / 120) * 0.15;
    ctx.strokeStyle = "rgba(130,220,255,0.9)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(endX, endY - 4, 14 * pulse, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(endX - 10 * pulse, endY - 4);
    ctx.lineTo(endX + 10 * pulse, endY - 4);
    ctx.moveTo(endX, endY - 14 * pulse);
    ctx.lineTo(endX, endY + 6);
    ctx.stroke();
    ctx.restore();
    // 剩余子弹指示（头顶小球）
    for (let i = 0; i < player.aerialShotsLeft; i++) {
      drawRasenOrb(player.x - 12 + i * 24, player.y - 130, 6);
    }
    // 剩余时间进度条
    const remain = Math.max(0, player.aerialDuration - (performance.now() - player.aerialStart));
    const barW = 60;
    ctx.fillStyle = "rgba(255,255,255,0.3)";
    ctx.fillRect(player.x - barW / 2, player.y - 145, barW, 4);
    ctx.fillStyle = "#4cf";
    ctx.fillRect(player.x - barW / 2, player.y - 145, barW * (remain / player.aerialDuration), 4);
  }

  // 玩家
  const flashOn = performance.now() < player.flashlightEnd;
  if (selectedChar === "doraemon") {
    drawDoraemon(player, player.atkT > 0 || flashOn);
  } else {
    drawNinja(player.x, player.y, player.facing, player.slashT > 0 || player.atkT > 0);
  }

  // 无敌帧视觉（任意门期间 500ms）
  if (performance.now() < player.invincibleUntil) {
    const pulse = 0.5 + Math.sin(performance.now() / 40) * 0.4;
    ctx.save();
    ctx.strokeStyle = `rgba(130, 230, 255, ${pulse})`;
    ctx.lineWidth = 3;
    ctx.shadowColor = "#7cf";
    ctx.shadowBlur = 14;
    ctx.beginPath();
    ctx.ellipse(player.x, player.y - 40, 28, 52, 0, 0, Math.PI * 2);
    ctx.stroke();
    // 顶端 "无敌" 标签
    ctx.shadowBlur = 0;
    ctx.fillStyle = "#7cf";
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 3;
    ctx.font = "900 13px -apple-system, 'PingFang SC', sans-serif";
    ctx.textAlign = "center";
    ctx.strokeText("无 敌", player.x, player.y - 110);
    ctx.fillText("无 敌", player.x, player.y - 110);
    ctx.restore();
  }

  // 石矛（1A 跟随旋转 / 2A 直冲突刺）
  if (player.spearT > 0) {
    const isSpin = player.spinT > 0;
    const prog = 1 - player.spearT / (isSpin ? 28 : 24);
    ctx.save();
    ctx.translate(player.x, player.y - 40);

    if (isSpin) {
      // 1A：矛跟随旋转角
      const spinProg = 1 - player.spinT / 28;
      ctx.rotate(spinProg * Math.PI * 4 - Math.PI / 2);
    } else {
      // 2A：直线突刺
      ctx.scale(player.facing, 1);
      // 冲击残影（3 道半透明后拖）
      for (let i = 3; i >= 1; i--) {
        ctx.save();
        ctx.translate(-i * 14, 0);
        ctx.globalAlpha = 0.14 * i;
        ctx.fillStyle = "#ff9955";
        ctx.fillRect(16, -8, 110, 12);
        ctx.beginPath();
        ctx.moveTo(124, -20); ctx.lineTo(164, -2); ctx.lineTo(124, 16);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    }

    // 矛柄（木质+纹理）
    ctx.fillStyle = "#8a6a3a";
    ctx.fillRect(16, -8, 110, 12);
    // 木纹高光
    ctx.fillStyle = "#ac8a52";
    ctx.fillRect(16, -8, 110, 3);
    ctx.fillStyle = "#5a3a1a";
    ctx.fillRect(16, 2, 110, 2);
    // 木纹斜线
    ctx.strokeStyle = "#5a3a1a";
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      ctx.moveTo(24 + i * 16, -8);
      ctx.lineTo(30 + i * 16, 4);
    }
    ctx.stroke();

    // 绳绑（5 道）
    ctx.strokeStyle = "#3a2212";
    ctx.lineWidth = 2.5;
    for (let i = 0; i < 5; i++) {
      const xx = 30 + i * 18;
      ctx.beginPath();
      ctx.moveTo(xx, -10);
      ctx.lineTo(xx + 4, 10);
      ctx.stroke();
    }

    // 矛尖石头（放大版，带锐利三角）
    ctx.fillStyle = "#c8c8cc";
    ctx.beginPath();
    ctx.moveTo(124, -20);
    ctx.lineTo(166, -2);
    ctx.lineTo(124, 16);
    ctx.closePath();
    ctx.fill();
    // 石头暗面
    ctx.fillStyle = "#888888";
    ctx.beginPath();
    ctx.moveTo(124, -2);
    ctx.lineTo(166, -2);
    ctx.lineTo(124, 16);
    ctx.closePath();
    ctx.fill();
    // 裂纹
    ctx.strokeStyle = "#2a2a2a";
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(130, -14); ctx.lineTo(146, -4); ctx.lineTo(140, 6);
    ctx.moveTo(146, -4); ctx.lineTo(156, -1);
    ctx.moveTo(134, 2); ctx.lineTo(150, 8);
    ctx.stroke();
    // 高光锋线
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(124, -20); ctx.lineTo(166, -2);
    ctx.stroke();

    // 能量光晕（矛尖橙色辉光）
    const pulse = 0.6 + Math.sin(performance.now() / 30) * 0.3;
    ctx.strokeStyle = `rgba(255,170,60,${pulse})`;
    ctx.lineWidth = 4;
    ctx.shadowColor = "#ff8833";
    ctx.shadowBlur = 22;
    ctx.beginPath();
    ctx.moveTo(124, -20);
    ctx.lineTo(166, -2);
    ctx.lineTo(124, 16);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // 矛尖前冲击线（速度线）
    ctx.strokeStyle = `rgba(255,255,255,${0.7 * (1 - prog)})`;
    ctx.lineWidth = 2;
    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      ctx.moveTo(170 + i * 10, -14 + i * 7);
      ctx.lineTo(200 + i * 10, -14 + i * 7);
      ctx.stroke();
    }

    ctx.restore();
  }

  // 2A 回旋斩（四色彩虹 + 冲击波环 + 粒子旋流）
  if (player.spinT > 0) {
    const prog = 1 - player.spinT / 28;
    ctx.save();
    ctx.translate(player.x, player.y - 40);

    // 四道彩色尾迹（层叠）
    const trails = [
      { color: "#ffdd55", r: 48, w: 6 },
      { color: "#ff8855", r: 44, w: 5 },
      { color: "#ff55aa", r: 40, w: 4 },
      { color: "#aa55ff", r: 36, w: 3 },
    ];
    trails.forEach((t, i) => {
      ctx.strokeStyle = t.color;
      ctx.lineWidth = t.w;
      ctx.shadowColor = t.color;
      ctx.shadowBlur = 14;
      ctx.globalAlpha = 0.8 - i * 0.12;
      ctx.beginPath();
      const base = prog * Math.PI * 4;
      ctx.arc(0, 0, t.r, base - 0.7 - i * 0.15, base + 0.7);
      ctx.stroke();
    });

    // 中央冲击波环（peak 时爆发）
    if (prog > 0.3 && prog < 0.85) {
      const ringT = (prog - 0.3) / 0.55;
      ctx.strokeStyle = `rgba(255,255,255,${(1 - ringT) * 0.9})`;
      ctx.lineWidth = 4;
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.arc(0, 0, 20 + ringT * 90, 0, Math.PI * 2);
      ctx.stroke();
      // 内环
      ctx.strokeStyle = `rgba(255,220,100,${(1 - ringT) * 0.7})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, 15 + ringT * 60, 0, Math.PI * 2);
      ctx.stroke();
    }

    // 星光粒子围绕（6 个点光）
    for (let i = 0; i < 6; i++) {
      const ang = prog * Math.PI * 4 + i * Math.PI / 3;
      const px = Math.cos(ang) * 50;
      const py = Math.sin(ang) * 50;
      ctx.globalAlpha = 0.8;
      ctx.fillStyle = "#fff";
      ctx.shadowColor = "#ffeeaa";
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(px, py, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // 4A 电击枪：水平锯齿电流
  if (player.thunderT > 0) {
    const alpha = Math.min(1, player.thunderT / 10);
    ctx.save();
    ctx.translate(player.x + player.facing * 20, player.y - 42);
    ctx.scale(player.facing, 1);
    // 电击枪（灰色手持）
    ctx.fillStyle = "#555";
    ctx.fillRect(0, -4, 24, 10);
    ctx.fillStyle = "#888";
    ctx.fillRect(20, -6, 14, 14);
    // 闪电主线
    ctx.strokeStyle = `rgba(255,255,120,${alpha})`;
    ctx.lineWidth = 3;
    ctx.shadowColor = "#ffee88";
    ctx.shadowBlur = 14;
    ctx.beginPath();
    let sx = 34, sy = 0;
    ctx.moveTo(sx, sy);
    for (let i = 0; i < 12; i++) {
      sx += (W / 2) / 12;
      sy = (Math.random() - 0.5) * 24;
      ctx.lineTo(sx, sy);
    }
    ctx.stroke();
    // 分叉
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = `rgba(180,240,255,${alpha * 0.7})`;
    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      const bx = 34 + ((W / 2) / 4) * i;
      ctx.moveTo(bx, 0);
      ctx.lineTo(bx + 15, (Math.random() - 0.5) * 30);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // 3A / 5A 小拳拳特效（范围 150，满屏拟声词+拳影+速度线）
  if (player.punchRushT > 0) {
    // 玩家身后速度线
    ctx.save();
    ctx.strokeStyle = "rgba(255,255,255,0.55)";
    ctx.lineWidth = 2;
    for (let i = 0; i < 5; i++) {
      const offsetY = (Math.random() - 0.5) * 60;
      const baseX = player.x - player.facing * (20 + i * 20);
      ctx.beginPath();
      ctx.moveTo(baseX, player.y - 40 + offsetY);
      ctx.lineTo(baseX - player.facing * (15 + Math.random() * 15), player.y - 40 + offsetY);
      ctx.stroke();
    }
    ctx.restore();

    // 拳头残影（朝前快速抖动）
    const fistOffset = Math.sin(performance.now() / 30) * 18;
    for (let i = 0; i < 3; i++) {
      ctx.save();
      ctx.globalAlpha = 0.25 - i * 0.07;
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(
        player.x + player.facing * (28 + fistOffset - i * 8),
        player.y - 50,
        8, 0, Math.PI * 2
      );
      ctx.fill();
      ctx.restore();
    }

    // 每几帧甩一个拟声词
    if (player.punchRushT % 3 === 0) {
      const dx = dummy.x - player.x;
      if (Math.sign(dx) === player.facing && Math.abs(dx) < 150) {
        const onos = ["POW!", "BAM!", "WHAM!", "BOOM!", "KAPOW!", "ZAP!"];
        const text = onos[Math.floor(Math.random() * onos.length)];
        const colors = ["#ff3355", "#ffdd33", "#ff8833", "#ff55dd"];
        const color = colors[Math.floor(Math.random() * colors.length)];
        const rot = (Math.random() - 0.5) * 0.5;
        const bx = dummy.x - player.facing * 30 + (Math.random() - 0.5) * 60;
        const by = dummy.y - 60 + (Math.random() - 0.5) * 50;
        ctx.save();
        ctx.translate(bx, by);
        ctx.rotate(rot);
        ctx.font = "900 22px -apple-system, 'PingFang SC', sans-serif";
        ctx.textAlign = "center";
        ctx.lineWidth = 4;
        ctx.strokeStyle = "#000";
        ctx.strokeText(text, 0, 0);
        ctx.fillStyle = color;
        ctx.fillText(text, 0, 0);
        ctx.restore();

        // 星爆（从拟声词位置炸开）
        for (let i = 0; i < 6; i++) {
          const a = (i / 6) * Math.PI * 2;
          particles.push({
            x: bx, y: by,
            vx: Math.cos(a) * 3 + (Math.random() - 0.5),
            vy: Math.sin(a) * 3 + (Math.random() - 0.5),
            life: 18,
            color: "#fff",
            size: 2,
          });
        }
      }
    }
  }

  // 哆啦A梦手电筒光束（持续 2s，范围扩大 50%）
  if (flashOn) {
    const remain = player.flashlightEnd - performance.now();
    const alpha = Math.min(1, remain / 400);  // 最后 400ms 渐隐
    ctx.save();
    ctx.translate(player.x, player.y - 40);
    ctx.scale(player.facing, 1);
    const grad = ctx.createLinearGradient(20, 0, 390, 0);
    grad.addColorStop(0, `rgba(255,255,200,${0.9 * alpha})`);
    grad.addColorStop(1, `rgba(255,230,100,0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(20, -12);
    ctx.lineTo(390, -105);
    ctx.lineTo(390, 105);
    ctx.lineTo(20, 12);
    ctx.closePath();
    ctx.fill();
    // 中心高光芯
    ctx.fillStyle = `rgba(255,255,255,${0.5 * alpha})`;
    ctx.beginPath();
    ctx.moveTo(20, -4);
    ctx.lineTo(390, -25);
    ctx.lineTo(390, 25);
    ctx.lineTo(20, 4);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // 任意门
  for (let i = doors.length - 1; i >= 0; i--) {
    const d = doors[i];
    const age = performance.now() - d.bornAt;
    if (age > d.life) { doors.splice(i, 1); continue; }
    const openT = Math.min(1, age / 150);
    ctx.save();
    ctx.translate(d.x, d.y);
    // 门框
    ctx.fillStyle = "#c864d2";
    ctx.fillRect(-18, -90, 4, 90);
    ctx.fillRect(14, -90, 4, 90);
    ctx.fillRect(-18, -94, 36, 4);
    // 门板（打开）
    ctx.save();
    ctx.translate(-14, -90);
    ctx.rotate(-openT * 1.0);
    ctx.fillStyle = "#ff8cd9";
    ctx.fillRect(0, 0, 28, 86);
    ctx.fillStyle = "#ffcc55";
    ctx.beginPath();
    ctx.arc(22, 45, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    // 门后异界（蓝色空间）
    ctx.fillStyle = `rgba(100, 200, 255, ${openT * 0.8})`;
    ctx.fillRect(-14, -88, 28, 86);
    ctx.restore();
  }

  // 铜锣烧盾（持续 5s，受到伤害减 90%）
  if (performance.now() < shieldActiveUntil) {
    const t = performance.now() / 100;
    const remainSec = Math.max(0, (shieldActiveUntil - performance.now()) / 1000);
    ctx.save();
    ctx.translate(player.x, player.y - 40);
    ctx.strokeStyle = "rgba(255,200,100,0.8)";
    ctx.lineWidth = 3;
    for (let k = 0; k < 3; k++) {
      ctx.globalAlpha = 0.4 + Math.sin(t + k) * 0.2;
      ctx.beginPath();
      ctx.arc(0, 0, 44 + k * 3, 0, Math.PI * 2);
      ctx.stroke();
    }
    // 铜锣烧符号
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = "#c88a40";
    ctx.beginPath();
    ctx.arc(0, 0, 10, 0, Math.PI);
    ctx.fill();
    ctx.fillStyle = "#e8b868";
    ctx.beginPath();
    ctx.arc(0, 0, 10, Math.PI, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // 头顶减伤标签 + 倒计时
    ctx.save();
    ctx.textAlign = "center";
    ctx.font = "900 14px -apple-system, 'PingFang SC', sans-serif";
    ctx.lineWidth = 3;
    ctx.strokeStyle = "#000";
    ctx.fillStyle = "#ffdd55";
    ctx.strokeText("减伤 90%", player.x, player.y - 120);
    ctx.fillText("减伤 90%", player.x, player.y - 120);
    ctx.font = "700 12px -apple-system, 'PingFang SC', sans-serif";
    ctx.fillStyle = "#fff";
    ctx.strokeText(remainSec.toFixed(1) + "s", player.x, player.y - 104);
    ctx.fillText(remainSec.toFixed(1) + "s", player.x, player.y - 104);
    ctx.restore();
  }

  // 时空暂停：任一方冻结时舞台灰化
  const stageEl = document.getElementById("stage");
  const anyFrozen = performance.now() < timeFrozenUntil || performance.now() < p1FrozenUntil;
  if (anyFrozen) {
    if (!stageEl.classList.contains("time-frozen")) stageEl.classList.add("time-frozen");
    ctx.fillStyle = "#fff";
    ctx.font = "900 36px -apple-system, 'PingFang SC', sans-serif";
    ctx.textAlign = "center";
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 5;
    ctx.strokeText("TIME STOP", W / 2, 80);
    ctx.fillText("TIME STOP", W / 2, 80);
    const end = Math.max(timeFrozenUntil, p1FrozenUntil);
    const remainSec = Math.max(0, (end - performance.now()) / 1000);
    ctx.font = "700 16px -apple-system, 'PingFang SC', sans-serif";
    ctx.strokeText(remainSec.toFixed(1) + "s", W / 2, 108);
    ctx.fillText(remainSec.toFixed(1) + "s", W / 2, 108);
  } else {
    if (stageEl.classList.contains("time-frozen")) stageEl.classList.remove("time-frozen");
  }

  // PVP: P2 铜锣烧盾
  if (gameMode === "pvp" && performance.now() < p2ShieldUntil) {
    const t = performance.now() / 100;
    const remainSec = Math.max(0, (p2ShieldUntil - performance.now()) / 1000);
    ctx.save();
    ctx.translate(p2.x, p2.y - 40);
    ctx.strokeStyle = "rgba(255,200,100,0.8)";
    ctx.lineWidth = 3;
    for (let k = 0; k < 3; k++) {
      ctx.globalAlpha = 0.4 + Math.sin(t + k) * 0.2;
      ctx.beginPath();
      ctx.arc(0, 0, 44 + k * 3, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = "#c88a40";
    ctx.beginPath();
    ctx.arc(0, 0, 10, 0, Math.PI);
    ctx.fill();
    ctx.fillStyle = "#e8b868";
    ctx.beginPath();
    ctx.arc(0, 0, 10, Math.PI, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.save();
    ctx.textAlign = "center";
    ctx.font = "900 14px -apple-system, 'PingFang SC', sans-serif";
    ctx.lineWidth = 3;
    ctx.strokeStyle = "#000";
    ctx.fillStyle = "#ffdd55";
    ctx.strokeText("减伤 90%", p2.x, p2.y - 120);
    ctx.fillText("减伤 90%", p2.x, p2.y - 120);
    ctx.font = "700 12px -apple-system, 'PingFang SC', sans-serif";
    ctx.fillStyle = "#fff";
    ctx.strokeText(remainSec.toFixed(1) + "s", p2.x, p2.y - 104);
    ctx.fillText(remainSec.toFixed(1) + "s", p2.x, p2.y - 104);
    ctx.restore();
  }

  // PVP: P2 手电筒光束
  if (gameMode === "pvp" && performance.now() < p2.flashlightEnd) {
    const remain = p2.flashlightEnd - performance.now();
    const alpha = Math.min(1, remain / 400);
    ctx.save();
    ctx.translate(p2.x, p2.y - 40);
    ctx.scale(p2.facing, 1);
    const grad = ctx.createLinearGradient(20, 0, 390, 0);
    grad.addColorStop(0, `rgba(255,255,200,${0.9 * alpha})`);
    grad.addColorStop(1, `rgba(255,230,100,0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(20, -12);
    ctx.lineTo(390, -105);
    ctx.lineTo(390, 105);
    ctx.lineTo(20, 12);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // 平A 刀光
  if (player.atkT > 0) {
    const prog = 1 - player.atkT / (player.atkType === 3 ? 26 : player.atkType === 2 ? 22 : 18);
    ctx.save();
    ctx.translate(player.x, player.y - 50);
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 4;
    ctx.shadowColor = "#9df";
    ctx.shadowBlur = 16;
    if (player.atkType === 1) {
      // 横斩：前方弧线
      ctx.beginPath();
      const start = -Math.PI / 3, end = Math.PI / 3;
      const a0 = start + (end - start) * Math.max(0, prog - 0.2);
      const a1 = start + (end - start) * Math.min(1, prog + 0.3);
      ctx.arc(player.facing * 30, 0, 60, player.facing > 0 ? a0 : Math.PI - a1,
              player.facing > 0 ? a1 : Math.PI - a0);
      ctx.stroke();
    } else if (player.atkType === 2) {
      // 上勾：向上弧线
      ctx.beginPath();
      const a0 = Math.PI / 2 + (prog - 0.3) * 1.4;
      const a1 = Math.PI / 2 + (prog + 0.2) * 1.4;
      ctx.arc(player.facing * 20, 10, 55,
              player.facing > 0 ? -a1 : Math.PI + a0,
              player.facing > 0 ? -a0 : Math.PI + a1);
      ctx.stroke();
    } else {
      // 3A 后翻：身后拖尾
      ctx.strokeStyle = "#a0f";
      ctx.shadowColor = "#a0f";
      for (let i = 0; i < 3; i++) {
        ctx.globalAlpha = 0.4 - i * 0.1;
        ctx.beginPath();
        ctx.moveTo(player.facing * (20 + i * 15), -10);
        ctx.lineTo(player.facing * (60 + i * 15), 20);
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  // 木桩 or P2
  const shakeX = dummy.shakeT > 0 ? (Math.random() - 0.5) * 6 : 0;
  if (!dummy.isDummy) {
    // PVP: 绘制 P2 角色
    ctx.save();
    ctx.translate(shakeX, 0);
    if (p2.char === "doraemon") {
      drawDoraemon(p2, p2.atkT > 0);
    } else {
      drawNinja(p2.x, p2.y, p2.facing, p2.atkT > 0, undefined, p2);
    }
    ctx.restore();
    // 保留眩晕星星/倒地标签逻辑继续走下面分支
  } else if (dummy.downT > 0) {
    // 倒地：向本体一侧倾倒
    const tilt = player.x < dummy.x ? Math.PI / 2.6 : -Math.PI / 2.6;
    ctx.save();
    ctx.translate(dummy.x + shakeX, dummy.y);
    ctx.rotate(tilt);
    ctx.translate(-(dummy.x + shakeX), -dummy.y);
    drawDummy(dummy.x + shakeX, dummy.y, dummy.hitFlash > 0);
    ctx.restore();
    // "倒地" 标记
    ctx.fillStyle = "#ff3355";
    ctx.font = "900 14px -apple-system, 'PingFang SC', sans-serif";
    ctx.textAlign = "center";
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 3;
    ctx.strokeText("倒 地", dummy.x, dummy.y - 130);
    ctx.fillText("倒 地", dummy.x, dummy.y - 130);
  } else {
    drawDummy(dummy.x + shakeX, dummy.y, dummy.hitFlash > 0);
  }

  // 眩晕星星
  if (dummy.stunT > 0) {
    ctx.save();
    ctx.translate(dummy.x + shakeX, dummy.y - 120);
    const t = performance.now() / 200;
    for (let i = 0; i < 3; i++) {
      const a = t + i * Math.PI * 2 / 3;
      ctx.font = "22px sans-serif";
      ctx.textAlign = "center";
      ctx.fillStyle = "#ffdd33";
      ctx.fillText("★", Math.cos(a) * 22, Math.sin(a) * 8);
    }
    ctx.restore();
  }

  // 苦无（匕首形状 + 拖尾）
  projectiles.forEach(p => {
    const dir = Math.sign(p.vx);
    // 拖尾
    ctx.strokeStyle = "rgba(200,220,255,0.4)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(p.x - dir * 30, p.y);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.scale(dir, 1);
    // 握柄（深色布条）
    ctx.fillStyle = "#3a2418";
    ctx.fillRect(-12, -2, 10, 4);
    // 环
    ctx.strokeStyle = "#777";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(-14, 0, 3, 0, Math.PI * 2);
    ctx.stroke();
    // 刀身（银色三角）
    ctx.fillStyle = "#d8dde4";
    ctx.beginPath();
    ctx.moveTo(-2, -5);
    ctx.lineTo(14, 0);
    ctx.lineTo(-2, 5);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = "#8a9099";
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  });

  // 螺旋丸飞行体
  rasenBalls.forEach(b => drawRasenOrb(b.x, b.y, b.size));

  // 手持充能螺旋丸（L 按住时）
  if (player.rasenCharging) {
    const p = Math.min(1, player.rasenChargeT / LONG_PRESS_THRESHOLD);
    const radius = 5 + p * 9;
    const bx = player.x + player.facing * 32;
    const by = player.y - 52;
    drawRasenOrb(bx, by, radius);
    // 充能进度弧
    ctx.strokeStyle = "#ffdd55";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(bx, by, 22, -Math.PI / 2, -Math.PI / 2 + p * Math.PI * 2);
    ctx.stroke();
  }

  // 粒子
  particles.forEach(p => {
    if (p.impact) {
      const prog = 1 - p.life / p.maxLife;
      const alpha = Math.max(0, 1 - prog);
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.expandTo * prog + 4, 0, Math.PI * 2);
      ctx.stroke();
      // 内层黄圈
      ctx.strokeStyle = "#ffdd55";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.expandTo * prog * 0.7 + 2, 0, Math.PI * 2);
      ctx.stroke();
    } else if (p.smoke) {
      ctx.globalAlpha = Math.min(0.7, p.life / 40);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.globalAlpha = Math.min(1, p.life / 20);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
  });
  ctx.globalAlpha = 1;

  // 飘字伤害
  damageTexts.forEach(d => {
    const t = d.life / d.maxLife;
    ctx.globalAlpha = Math.min(1, t * 1.5);
    // 暴击（技能大招）带缩放弹出
    const popScale = d.crit ? (1 + (1 - t) * 0.4) : 1;
    const size = d.size * popScale;
    ctx.font = `900 ${size}px -apple-system, "PingFang SC", sans-serif`;
    ctx.textAlign = "center";
    ctx.lineWidth = 4;
    ctx.strokeStyle = "#000";
    ctx.strokeText(d.text, d.x, d.y);
    ctx.fillStyle = d.color;
    ctx.fillText(d.text, d.x, d.y);
  });
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawNinja(x, y, facing, attacking, tint, state) {
  state = state || player;
  const isSelf = state === player;
  const aerialState = isSelf && inAerial();
  const moving = Math.abs(state.vx || 0) > 0.15 && state.onGround !== false && !attacking && !aerialState;
  const jumping = state.onGround === false && !attacking;
  const walkT = state.walkT || 0;
  const landT = state.landT || 0;
  const blinking = (state.blinkT || 0) < 6;
  const flipT = state.flipT || 0;
  const atkType = state.atkType || 0;
  const now = performance.now();

  ctx.save();
  ctx.translate(x, y);

  // 落地挤压（整体压扁）
  if (landT > 0) {
    const k = landT / 8;
    ctx.scale(1 + k * 0.15, 1 - k * 0.2);
  }

  // 后翻旋转（绕腰部）
  if (flipT > 0) {
    ctx.translate(0, -40);
    const r = (1 - flipT / 22) * Math.PI * 2;
    ctx.rotate(-facing * r);
    ctx.translate(0, 40);
  }

  ctx.scale(facing, 1);

  // 奔跑时身体前倾
  if (moving) {
    ctx.translate(0, -40);
    ctx.rotate(0.15);
    ctx.translate(0, 40);
  }

  // 鸣人配色
  const orange   = tint || "#ff8a30";
  const darkOrg  = tint || "#c95a10";
  const black    = tint || "#1a1a1a";
  const skin     = tint || "#ffd9a8";
  const yellow   = "#ffd91f";
  const yellowDk = "#d9a500";
  const blue     = "#2f55b8";
  const silver   = "#b8b8b8";

  // 呼吸 / 走路上下晃
  const idleBob = Math.sin(now / 500) * 1.2;
  const walkBob = moving ? Math.abs(Math.sin(walkT * 2)) * 3 : 0;
  const bodyY = moving ? -walkBob : idleBob;

  // 腿摆动角度
  const legSwing = moving ? Math.sin(walkT) * 0.55 : 0;

  // ===== 腿 & 鞋 =====
  function drawLeg(hipX, angle, jumpBent) {
    ctx.save();
    ctx.translate(hipX, -22 + bodyY);
    if (jumpBent) {
      ctx.rotate(jumpBent);
    } else {
      ctx.rotate(angle);
    }
    ctx.fillStyle = orange;
    ctx.fillRect(-5, 0, 10, 22);
    ctx.fillStyle = darkOrg;
    ctx.fillRect(-5, 18, 10, 2);
    // 凉鞋
    ctx.fillStyle = blue;
    ctx.fillRect(-7, 20, 14, 4);
    ctx.restore();
  }
  if (attacking && atkType === 2) {
    // 2A 侧踢：支撑腿站立，踢腿向前上方伸出
    drawLeg(-9, 0.1, 0);
    ctx.save();
    ctx.translate(9, -40 + bodyY);
    ctx.rotate(-Math.PI / 2.2);
    ctx.fillStyle = orange;
    ctx.fillRect(-5, 0, 10, 34);
    ctx.fillStyle = darkOrg;
    ctx.fillRect(-5, 30, 10, 2);
    ctx.fillStyle = blue;
    ctx.fillRect(-7, 32, 14, 4);
    ctx.restore();
  } else if (jumping) {
    drawLeg(-9, 0, -0.6);
    drawLeg(9, 0, -0.3);
  } else {
    drawLeg(-9, legSwing, 0);
    drawLeg(9, -legSwing, 0);
  }

  // ===== 上身 =====
  ctx.save();
  ctx.translate(0, bodyY);

  // 躯干：橙主体
  ctx.fillStyle = orange;
  ctx.fillRect(-17, -62, 34, 40);
  // 黑肩
  ctx.fillStyle = black;
  ctx.fillRect(-17, -68, 34, 10);
  // 腰间黑条
  ctx.fillRect(-17, -44, 34, 3);
  // 漩涡村标
  ctx.fillStyle = "#d94";
  ctx.beginPath();
  ctx.arc(-6, -52, 3, 0, Math.PI * 2);
  ctx.fill();
  // 拉链
  ctx.strokeStyle = darkOrg;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, -58); ctx.lineTo(0, -46);
  ctx.stroke();

  // ===== 脸（3/4 视角，脸保持正面） =====
  ctx.fillStyle = skin;
  ctx.beginPath();
  ctx.arc(0, -78, 12, 0, Math.PI * 2);
  ctx.fill();

  // 胡须（两边各 3 道）
  ctx.strokeStyle = "#5a3a1a";
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let i = 0; i < 3; i++) {
    const yy = -80 + i * 3;
    ctx.moveTo(3, yy); ctx.lineTo(10, yy);
    ctx.moveTo(-3, yy); ctx.lineTo(-10, yy);
  }
  ctx.stroke();

  // 眼睛（两只，微微偏前表现 3/4）
  if (blinking) {
    ctx.strokeStyle = "#111";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-6, -83); ctx.lineTo(-2, -83);
    ctx.moveTo(3, -83); ctx.lineTo(8, -83);
    ctx.stroke();
  } else {
    ctx.fillStyle = "#111";
    ctx.fillRect(-5, -84, 3, 3);  // 后眼
    ctx.fillRect(3, -84, 3.5, 3.5); // 前眼稍大
  }

  // 嘴（攻击时张大）
  ctx.strokeStyle = "#5a3a1a";
  ctx.lineWidth = 1;
  if (attacking) {
    ctx.fillStyle = "#4a1a0a";
    ctx.beginPath();
    ctx.ellipse(2, -72, 3, 2.5, 0, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.beginPath();
    ctx.moveTo(0, -73); ctx.lineTo(4, -73);
    ctx.stroke();
  }

  // ===== 护额 =====
  ctx.fillStyle = blue;
  ctx.fillRect(-13, -92, 26, 6);
  ctx.fillStyle = silver;
  ctx.fillRect(-10, -91, 20, 4);
  ctx.strokeStyle = "#333";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(0, -89, 2.5, 0, Math.PI * 1.8);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-1, -92); ctx.lineTo(3, -88);
  ctx.stroke();

  // ===== 头发（刺头，移动时抖动）=====
  const hairShake = moving ? Math.sin(walkT * 2) * 1.5 : (jumping ? 2 : 0);
  ctx.fillStyle = yellow;
  const spikes = [-12, -8, -4, 0, 4, 8, 12];
  spikes.forEach((sx, i) => {
    const h = 10 + (i % 2 === 0 ? 4 : 0);
    ctx.beginPath();
    ctx.moveTo(sx - 3, -92);
    ctx.lineTo(sx + hairShake * 0.3, -92 - h);
    ctx.lineTo(sx + 3, -92);
    ctx.closePath();
    ctx.fill();
  });
  ctx.fillRect(-13, -88, 3, 8);
  ctx.fillRect(10, -88, 3, 8);
  // 阴影刺
  ctx.fillStyle = yellowDk;
  spikes.forEach((sx, i) => {
    if (i % 2 === 1) {
      ctx.beginPath();
      ctx.moveTo(sx - 1, -92);
      ctx.lineTo(sx + hairShake * 0.3, -100);
      ctx.lineTo(sx + 2, -92);
      ctx.closePath();
      ctx.fill();
    }
  });

  // 护额飘带（移动/跳跃时向后飘更厉害）
  const bandWind = moving ? 6 + Math.sin(walkT * 2) * 2 : (jumping ? 10 : Math.sin(now / 100) * 2);
  ctx.strokeStyle = blue;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-11, -89);
  ctx.quadraticCurveTo(-18 - bandWind, -82 + Math.sin(now / 80) * 2, -24 - bandWind, -70);
  ctx.stroke();

  // ===== 手臂 =====
  const rasenHold = (state.rasenCharging || (state.rasenThrowT || 0) > 0);
  const aerialPose = isSelf && inAerial();
  const sealActive = isSelf && player.sealT > 0;

  if (aerialPose) {
    // 飞天：双手向下准备投球
    drawArm(11, -64, 1.3, orange, black, skin);
    drawArm(-11, -64, 1.6, orange, black, skin);
  } else if (rasenHold) {
    // 螺旋丸：凝聚/前推
    const throwT = state.rasenThrowT || 0;
    const throwing = throwT > 0;
    const pushOut = throwing ? (14 - throwT) * 0.12 : 0;
    drawArm(11, -64, -1.3 + pushOut, orange, black, skin);
    drawArm(-11, -62, -0.9, orange, black, skin);
  } else if (sealActive) {
    // 影分身结印：双手合十胸前
    ctx.fillStyle = orange;
    ctx.fillRect(-14, -56, 28, 8);   // 横跨前臂
    ctx.fillStyle = black;
    ctx.fillRect(-14, -56, 4, 8);
    ctx.fillRect(10, -56, 4, 8);
    ctx.fillStyle = skin;
    ctx.fillRect(-3, -58, 6, 6);     // 合掌
  } else if (attacking) {
    // 普通攻击：前拳伸展
    ctx.fillStyle = black;
    ctx.fillRect(10, -66, 6, 8);
    ctx.fillStyle = orange;
    ctx.fillRect(16, -64, 20, 8);
    ctx.fillStyle = skin;
    ctx.fillRect(36, -66, 8, 12);
    ctx.fillStyle = black;
    ctx.fillRect(-16, -66, 6, 8);
    ctx.fillStyle = orange;
    ctx.fillRect(-22, -52, 8, 18);
    ctx.fillStyle = skin;
    ctx.fillRect(-22, -36, 8, 8);
  } else if (jumping) {
    // 跳跃：前手高举
    drawArm(11, -64, -1.8, orange, black, skin);
    drawArm(-11, -64, 0.8, orange, black, skin);
  } else if (moving) {
    // 走/跑：摆臂（前冲感，角度加大）
    const armA = -Math.sin(walkT) * 0.9;
    drawArm(11, -64, armA, orange, black, skin);
    drawArm(-11, -64, -armA, orange, black, skin);
  } else {
    // 待机：双手抱胸（酷姿）
    // 下层手臂：从左肩横到右腰
    ctx.fillStyle = orange;
    ctx.fillRect(-14, -52, 28, 7);
    ctx.fillStyle = black;
    ctx.fillRect(-14, -52, 5, 7);  // 左黑肩袖
    ctx.fillStyle = skin;
    ctx.fillRect(11, -52, 5, 7);   // 右拳露出
    // 上层手臂：从右肩横到左腰
    ctx.fillStyle = orange;
    ctx.fillRect(-14, -60, 28, 7);
    ctx.fillStyle = black;
    ctx.fillRect(9, -60, 5, 7);    // 右黑肩袖
    ctx.fillStyle = skin;
    ctx.fillRect(-16, -60, 5, 7);  // 左拳露出
    // 轻微呼吸偏移
    // 不单独绘制，已在 bodyY 里处理
  }

  ctx.restore(); // 身体 translate

  ctx.restore(); // 整体
}

function drawArm(shoulderX, shoulderY, angle, orange, black, skin) {
  ctx.save();
  ctx.translate(shoulderX, shoulderY);
  ctx.rotate(angle);
  ctx.fillStyle = black;
  ctx.fillRect(-4, 0, 8, 8);        // 黑肩袖
  ctx.fillStyle = orange;
  ctx.fillRect(-4, 8, 8, 14);       // 橙前臂
  ctx.fillStyle = skin;
  ctx.fillRect(-4, 22, 8, 8);       // 拳头
  ctx.restore();
}

function drawDummy(x, y, flash) {
  ctx.save();
  ctx.translate(x, y);
  // 底座
  ctx.fillStyle = "#3a2010";
  ctx.fillRect(-30, -10, 60, 10);
  // 柱身
  ctx.fillStyle = flash ? "#ff8855" : "#6a3a1a";
  ctx.fillRect(-22, -90, 44, 80);
  // 木纹
  ctx.strokeStyle = "#3a2010";
  ctx.lineWidth = 1;
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(-22, -80 + i * 20);
    ctx.lineTo(22, -80 + i * 20);
    ctx.stroke();
  }
  // 头
  ctx.fillStyle = flash ? "#ffaa88" : "#8a4a2a";
  ctx.beginPath();
  ctx.arc(0, -100, 16, 0, Math.PI * 2);
  ctx.fill();
  // 靶心
  ctx.strokeStyle = "#fff";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, -50, 10, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0, -50, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

// ===== 封面按钮 =====
function hideCover() {
  document.getElementById("cover").classList.add("hidden");
}
function startPVPMatch(p1Char = "naruto", p2Char = "doraemon") {
  gameMode = "pvp";
  dummy = p2;
  p2.char = p2Char;
  applyCharacter(p1Char);
  document.getElementById("charSwitcher").classList.add("hidden-pvp");
  // 清空系列比分
  p1Wins = 0;
  p2Wins = 0;
  clearTimeout(roundTimeoutId);
  const buttons = document.querySelector('.match-buttons');
  buttons.style.display = '';
  document.getElementById("matchOverlay").classList.add("hidden");
  resetRound();
  refreshAvatarDisplay();
  updateWinPips();
  updateSkillBarKeys();
  updateHint();
}

let pickedP1 = "naruto";
let pickedP2 = "doraemon";

document.querySelectorAll("#coverSelect .pick-card").forEach(el => {
  el.addEventListener("click", () => {
    const cards = el.closest(".pick-cards");
    const side = cards.dataset.p;
    const char = el.dataset.char;
    if (side === "p1") pickedP1 = char;
    else pickedP2 = char;
    cards.querySelectorAll(".pick-card").forEach(c => c.classList.remove("active"));
    el.classList.add("active");
  });
});

  // 打开角色选择页
  document.getElementById("coverMain").classList.add("hidden");
  document.getElementById("coverSelect").classList.remove("hidden");
});

document.getElementById("btnConfirmPick").addEventListener("click", () => {
  startPVPMatch(pickedP1, pickedP2);

  document.getElementById("coverSelect").classList.add("hidden");

  document.getElementById("coverSelect").classList.add("hidden");
});

});

  document.getElementById("charSwitcher").classList.remove("hidden-pvp");
});

  gameMode = "training";
  dummy = baseDummy;

  document.getElementById("charSwitcher").classList.remove("hidden-pvp");

  updateSkillBarKeys();

  refreshAvatarDisplay();
  hideCover();
});

// ===== 左上角角色切换 =====
const avatarBtn = document.getElementById("avatarBtn");
const charPanel = document.getElementById("charPanel");
const currentSvg = document.getElementById("currentAvatarSvg");

function refreshAvatarDisplay() {
  // 克隆选中角色的 SVG 内容到顶部按钮
  const card = document.querySelector(`.avatar-card[data-char="${selectedChar}"]`);
  currentSvg.innerHTML = card.querySelector("svg").innerHTML;
  const btn = document.getElementById("avatarBtn");
  btn.style.background = selectedChar === "naruto" ? "#d96518" : "#1d7db8";
  btn.style.borderColor = selectedChar === "naruto" ? "#ffdd55" : "#4cc8ff";
  // 更新卡片选中态
  document.querySelectorAll(".avatar-card").forEach(c => {
    c.classList.toggle("active", c.dataset.char === selectedChar);
  });
}
refreshAvatarDisplay();

avatarBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  charPanel.classList.toggle("hidden");
});
document.addEventListener("click", () => charPanel.classList.add("hidden"));
charPanel.addEventListener("click", (e) => e.stopPropagation());

document.querySelectorAll(".avatar-card").forEach(card => {
  card.addEventListener("click", () => {
    const char = card.dataset.char;
    if (char !== selectedChar) {
      applyCharacter(char);
      refreshAvatarDisplay();
      if (typeof updateWinPips === "function") updateWinPips();
    }
    charPanel.classList.add("hidden");
  });
});

</script>
</body>
</html>
