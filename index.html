<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>拳皇小派 · 闪电忍者</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(180deg, #1a1033 0%, #0a0518 100%);
    color: #fff;
    font-family: -apple-system, "PingFang SC", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    user-select: none;
  }
  h1 {
    font-size: 22px;
    letter-spacing: 4px;
    margin-bottom: 12px;
    text-shadow: 0 0 12px #7a5cff;
  }

  /* ===== 封面 ===== */
  #cover {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: radial-gradient(ellipse at center, #1a0a3a 0%, #05020e 100%);
    transition: opacity 0.5s;
  }
  #cover.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .cover-orb {
    position: absolute;
    width: 480px;
    height: 480px;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.5;
    pointer-events: none;
  }
  .orb-left {
    background: radial-gradient(circle, #ff8a30 0%, transparent 70%);
    top: 10%;
    left: -140px;
    animation: floatA 8s ease-in-out infinite;
  }
  .orb-right {
    background: radial-gradient(circle, #4cc8ff 0%, transparent 70%);
    bottom: 5%;
    right: -140px;
    animation: floatB 10s ease-in-out infinite;
  }
  @keyframes floatA {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(80px, -50px); }
  }
  @keyframes floatB {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-80px, 50px); }
  }
  .cover-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(122, 92, 255, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(122, 92, 255, 0.06) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
    pointer-events: none;
  }
  .cover-content {
    position: relative;
    text-align: center;
    padding: 40px;
  }
  .cover-badge {
    font-size: 13px;
    letter-spacing: 10px;
    color: #ffdd55;
    margin-bottom: 20px;
    text-shadow: 0 0 14px rgba(255, 221, 85, 0.7);
  }
  .cover-title {
    font-size: 140px;
    font-weight: 900;
    letter-spacing: 10px;
    margin: 0 0 28px 0;
    display: flex;
    justify-content: center;
    gap: 10px;
    line-height: 1;
  }
  .cover-title .tch {
    display: inline-block;
    background: linear-gradient(180deg, #ffeb7a 0%, #ff8a30 55%, #ff3355 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 6px 0 rgba(0,0,0,0.35)) drop-shadow(0 0 24px rgba(255,138,48,0.5));
    animation: titleFloat 3s ease-in-out infinite;
  }
  .cover-title .tch:nth-child(2) { animation-delay: 0.15s; }
  .cover-title .tch:nth-child(3) { animation-delay: 0.3s;  }
  .cover-title .tch:nth-child(4) { animation-delay: 0.45s; }
  @keyframes titleFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .cover-sub {
    font-size: 14px;
    letter-spacing: 4px;
    color: #aab;
    margin: 0 0 52px 0;
  }
  .cover-buttons {
    display: flex;
    gap: 28px;
    justify-content: center;
    margin-bottom: 48px;
  }
  .cbtn {
    position: relative;
    padding: 18px 54px;
    background: rgba(255, 138, 48, 0.08);
    border: 2px solid #ff8a30;
    border-radius: 6px;
    color: #fff;
    font-size: 19px;
    font-weight: 700;
    letter-spacing: 5px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 0 26px rgba(255, 138, 48, 0.3);
    font-family: inherit;
  }
  .cbtn:hover {
    transform: translateY(-3px) scale(1.04);
    background: rgba(255, 138, 48, 0.22);
    box-shadow: 0 0 40px rgba(255, 138, 48, 0.65);
  }
  .cbtn:active { transform: scale(0.98); }
  .cbtn-icon { font-size: 22px; }
  .cbtn-secondary {
    border-color: #4cc8ff;
    background: rgba(76, 200, 255, 0.08);
    box-shadow: 0 0 26px rgba(76, 200, 255, 0.3);
  }
  .cbtn-secondary:hover {
    background: rgba(76, 200, 255, 0.22);
    box-shadow: 0 0 40px rgba(76, 200, 255, 0.65);
  }
  .cbtn-tag {
    position: absolute;
    top: -10px;
    right: -10px;
    background: #ff3355;
    color: #fff;
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 10px;
    letter-spacing: 2px;
  }
  .cover-footer {
    font-size: 12px;
    color: #666;
    letter-spacing: 3px;
    margin: 0;
  }

  /* 角色选择 */
  #coverSelect.hidden { display: none; }
  .pick-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 48px;
    margin: 32px 0 48px 0;
  }
  .pick-side { display: flex; flex-direction: column; align-items: center; }
  .pick-label {
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 6px;
    margin-bottom: 16px;
    text-shadow: 0 0 12px currentColor;
  }
  .pick-cards { display: flex; gap: 14px; }
  .pick-card {
    width: 120px;
    padding: 14px 10px;
    background: rgba(255, 255, 255, 0.05);
    border: 2px solid rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    color: #fff;
    font-family: inherit;
    transition: all 0.15s;
  }
  .pick-card:hover {
    border-color: #ffdd55;
    transform: translateY(-3px);
    background: rgba(255, 221, 85, 0.08);
  }
  .pick-card.active {
    border-color: #ff8a30;
    background: rgba(255, 138, 48, 0.18);
    box-shadow: 0 0 22px rgba(255, 138, 48, 0.55);
  }
  .pick-cards[data-p="p2"] .pick-card.active {
    border-color: #4cc8ff;
    background: rgba(76, 200, 255, 0.18);
    box-shadow: 0 0 22px rgba(76, 200, 255, 0.55);
  }
  .pick-card svg {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: #1a1040;
  }
  .pick-card span {
    font-size: 14px;
    letter-spacing: 3px;
    font-weight: 700;
  }
  .vs-mark {
    font-size: 48px;
    font-weight: 900;
    letter-spacing: 4px;
    background: linear-gradient(180deg, #ffeb7a, #ff3355);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 18px rgba(255,138,48,0.6));
  }
  /* PVP 时隐藏左上角角色切换器（锁定角色） */
  .char-switcher.hidden-pvp { display: none; }

  /* ===== 左上角角色切换 ===== */
  .char-switcher {
    position: fixed;
    top: 18px;
    left: 18px;
    z-index: 50;
  }
  .avatar-btn {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    border: 3px solid #fff;
    background: #ff8a30;
    padding: 0;
    cursor: pointer;
    overflow: hidden;
    box-shadow: 0 0 14px rgba(255, 138, 48, 0.5);
    transition: transform 0.15s, box-shadow 0.2s;
  }
  .avatar-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 22px rgba(255, 221, 85, 0.8);
  }
  .avatar-btn svg { display: block; width: 100%; height: 100%; }
  .char-panel {
    position: absolute;
    top: 66px;
    left: 0;
    min-width: 220px;
    background: rgba(18, 10, 36, 0.96);
    border: 2px solid #5a3aff;
    border-radius: 10px;
    padding: 12px;
    box-shadow: 0 10px 32px rgba(0,0,0,0.6);
    transform-origin: top left;
    transition: opacity 0.15s, transform 0.15s;
  }
  .char-panel.hidden {
    opacity: 0;
    transform: scale(0.9);
    pointer-events: none;
  }
  .panel-title {
    font-size: 12px;
    letter-spacing: 5px;
    color: #ffdd55;
    margin-bottom: 10px;
    text-align: center;
  }
  .avatars {
    display: flex;
    gap: 10px;
  }
  .avatar-card {
    background: transparent;
    border: 2px solid transparent;
    border-radius: 10px;
    cursor: pointer;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #fff;
    font-family: inherit;
    transition: all 0.15s;
  }
  .avatar-card:hover {
    border-color: #ffdd55;
    background: rgba(255, 221, 85, 0.08);
  }
  .avatar-card.active {
    border-color: #ff8a30;
    background: rgba(255, 138, 48, 0.18);
    box-shadow: 0 0 14px rgba(255, 138, 48, 0.5);
  }
  .avatar-card svg {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #1a1040;
    margin-bottom: 6px;
  }
  .avatar-card.naruto-bg svg { background: #d96518; }
  .avatar-card.doraemon-bg svg { background: #1d7db8; }
  .avatar-card span {
    font-size: 12px;
    letter-spacing: 2px;
  }

  /* ===== 胜负结算 ===== */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 80;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(5, 2, 15, 0.6);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .overlay.hidden { display: none; }
  .match-box {
    padding: 40px 56px;
    background: linear-gradient(180deg, #1a1040 0%, #0a0518 100%);
    border: 2px solid #ffdd55;
    border-radius: 14px;
    text-align: center;
    box-shadow: 0 0 60px rgba(255, 221, 85, 0.35);
    animation: popIn 0.4s;
  }
  @keyframes popIn {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .overlay.win-p1 .match-box { border-color: #ff8a30; box-shadow: 0 0 60px rgba(255,138,48,0.4); }
  .overlay.win-p2 .match-box { border-color: #4cc8ff; box-shadow: 0 0 60px rgba(76,200,255,0.4); }
  #matchTitle {
    margin: 0 0 12px 0;
    font-size: 46px;
    letter-spacing: 14px;
    background: linear-gradient(180deg, #ffeb7a 0%, #ff8a30 50%, #ff3355 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 20px rgba(255,138,48,0.5));
  }
  #matchSub {
    margin: 0 0 28px 0;
    font-size: 14px;
    letter-spacing: 4px;
    color: #aab;
  }
  .match-buttons {
    display: flex;
    gap: 16px;
    justify-content: center;
  }
  .match-buttons button {
    padding: 12px 28px;
    background: rgba(255, 221, 85, 0.12);
    border: 2px solid #ffdd55;
    border-radius: 6px;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .match-buttons button:hover {
    background: rgba(255, 221, 85, 0.28);
    transform: translateY(-2px);
  }
  #btnBackMenu { border-color: #888; }
  #btnBackMenu:hover { background: rgba(180, 180, 180, 0.2); }
  #stage {
    position: relative;
    width: 960px;
    height: 480px;
    background: linear-gradient(180deg, #2a1a5e 0%, #120a2e 70%, #3a1a1a 100%);
    border: 2px solid #5a3aff;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(122, 92, 255, 0.3);
    transition: filter 0.25s;
  }
  #stage.time-frozen {
    filter: grayscale(1) contrast(1.05) brightness(1.05);
  }
  #stage::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 40px;
    background: linear-gradient(180deg, transparent, rgba(0,0,0,0.4));
  }
  canvas { display: block; }
  .hpbar {
    position: absolute;
    top: 14px;
    width: 320px;
    height: 22px;
    background: rgba(0,0,0,0.5);
    border: 2px solid #fff;
    border-radius: 4px;
    overflow: hidden;
  }
  .hpbar.left { left: 20px; }
  .hpbar.right { right: 20px; }
  .hpbar .fill {
    height: 100%;
    background: linear-gradient(90deg, #00ff88, #ffdd00, #ff3355);
    background-size: 300px 100%;
    background-position: left;
    transition: width 0.3s;
  }
  .hpbar .name {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-shadow: 0 1px 2px #000;
  }
  .hpbar .hpnum {
    font-size: 12px;
    letter-spacing: 0;
    color: #fff;
    font-variant-numeric: tabular-nums;
  }
  #skillbar {
    margin-top: 18px;
    display: flex;
    gap: 14px;
  }
  .skill {
    position: relative;
    width: 88px;
    height: 88px;
    background: #1a1040;
    border: 2px solid #5a3aff;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: pointer;
  }
  .skill .key {
    position: absolute;
    top: 4px;
    left: 6px;
    font-size: 11px;
    color: #ffdd55;
    font-weight: 700;
  }
  .skill .icon {
    font-size: 28px;
    margin-bottom: 4px;
  }
  .skill .label {
    font-size: 12px;
    letter-spacing: 1px;
  }
  .skill .cd-mask {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    opacity: 0;
    pointer-events: none;
  }
  .skill.cooling .cd-mask { opacity: 1; }
  .skill.ready {
    box-shadow: 0 0 14px rgba(122, 92, 255, 0.6);
  }
  .skill.flash {
    animation: flash 0.3s;
  }
  @keyframes flash {
    0%, 100% { background: #1a1040; }
    50% { background: #7a5cff; }
  }
  #hint {
    margin-top: 12px;
    color: #aaa;
    font-size: 12px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <!-- 封面 -->
  <div id="cover">
    <div class="cover-orb orb-left"></div>
    <div class="cover-orb orb-right"></div>
    <div class="cover-grid"></div>
    <div class="cover-content" id="coverMain">
      <div class="cover-badge">NARUTO · FIGHTING</div>
      <h1 class="cover-title">
        <span class="tch">动</span>
        <span class="tch">漫</span>
        <span class="tch">战</span>
        <span class="tch">斗</span>
      </h1>
      <p class="cover-sub">木叶忍者 · 四技能三连击 · 一触即发</p>
      <div class="cover-buttons">
        <button class="cbtn" id="btnStart">
          <span class="cbtn-icon">⚔</span>
          <span>开始游戏</span>
          <span class="cbtn-tag">PVP</span>
        </button>
        <button class="cbtn cbtn-secondary" id="btnTraining">
          <span class="cbtn-icon">🎯</span>
          <span>木桩训练</span>
        </button>
      </div>
      <p class="cover-footer">v0.1 · 点击任意按钮开始</p>
    </div>

    <div class="cover-content hidden" id="coverSelect">
      <div class="cover-badge">选 择 角 色</div>
      <div class="pick-row">
        <div class="pick-side">
          <div class="pick-label" style="color:#ff8a30;">P 1</div>
          <div class="pick-cards" data-p="p1">
            <button class="pick-card active" data-char="naruto">
              <svg viewBox="0 0 40 40">
                <polygon points="6,14 9,2 13,12 16,0 20,10 24,0 27,12 31,2 34,14" fill="#ffd91f"/>
                <circle cx="20" cy="24" r="12" fill="#ffd9a8"/>
                <rect x="8" y="14" width="24" height="5" fill="#2f55b8"/>
                <rect x="12" y="14.5" width="16" height="3.5" fill="#b8b8b8"/>
                <rect x="15" y="22" width="2" height="2" fill="#111"/>
                <rect x="23" y="22" width="2" height="2" fill="#111"/>
                <line x1="8" y1="26" x2="14" y2="26" stroke="#5a3a1a" stroke-width="1"/>
                <line x1="26" y1="26" x2="32" y2="26" stroke="#5a3a1a" stroke-width="1"/>
              </svg>
              <span>鸣 人</span>
            </button>
            <button class="pick-card" data-char="doraemon">
              <svg viewBox="0 0 40 40">
                <circle cx="20" cy="20" r="16" fill="#30a8e8"/>
                <ellipse cx="20" cy="22" rx="11" ry="10" fill="#fff"/>
                <ellipse cx="16.5" cy="15" rx="3" ry="4" fill="#fff" stroke="#111" stroke-width="0.8"/>
                <ellipse cx="23.5" cy="15" rx="3" ry="4" fill="#fff" stroke="#111" stroke-width="0.8"/>
                <circle cx="17.5" cy="16" r="1.3" fill="#111"/>
                <circle cx="22.5" cy="16" r="1.3" fill="#111"/>
                <circle cx="20" cy="20" r="2.5" fill="#e63946"/>
                <path d="M16 25 Q20 28 24 25" stroke="#111" fill="none" stroke-width="1.2"/>
              </svg>
              <span>哆 啦 A 梦</span>
            </button>
          </div>
        </div>
        <div class="vs-mark">VS</div>
        <div class="pick-side">
          <div class="pick-label" style="color:#4cc8ff;">P 2</div>
          <div class="pick-cards" data-p="p2">
            <button class="pick-card" data-char="naruto">
              <svg viewBox="0 0 40 40">
                <polygon points="6,14 9,2 13,12 16,0 20,10 24,0 27,12 31,2 34,14" fill="#ffd91f"/>
                <circle cx="20" cy="24" r="12" fill="#ffd9a8"/>
                <rect x="8" y="14" width="24" height="5" fill="#2f55b8"/>
                <rect x="12" y="14.5" width="16" height="3.5" fill="#b8b8b8"/>
                <rect x="15" y="22" width="2" height="2" fill="#111"/>
                <rect x="23" y="22" width="2" height="2" fill="#111"/>
                <line x1="8" y1="26" x2="14" y2="26" stroke="#5a3a1a" stroke-width="1"/>
                <line x1="26" y1="26" x2="32" y2="26" stroke="#5a3a1a" stroke-width="1"/>
              </svg>
              <span>鸣 人</span>
            </button>
            <button class="pick-card active" data-char="doraemon">
              <svg viewBox="0 0 40 40">
                <circle cx="20" cy="20" r="16" fill="#30a8e8"/>
                <ellipse cx="20" cy="22" rx="11" ry="10" fill="#fff"/>
                <ellipse cx="16.5" cy="15" rx="3" ry="4" fill="#fff" stroke="#111" stroke-width="0.8"/>
                <ellipse cx="23.5" cy="15" rx="3" ry="4" fill="#fff" stroke="#111" stroke-width="0.8"/>
                <circle cx="17.5" cy="16" r="1.3" fill="#111"/>
                <circle cx="22.5" cy="16" r="1.3" fill="#111"/>
                <circle cx="20" cy="20" r="2.5" fill="#e63946"/>
                <path d="M16 25 Q20 28 24 25" stroke="#111" fill="none" stroke-width="1.2"/>
              </svg>
              <span>哆 啦 A 梦</span>
            </button>
          </div>
        </div>
      </div>
      <div class="cover-buttons">
        <button class="cbtn" id="btnConfirmPick">
          <span class="cbtn-icon">⚔</span>
          <span>开 打!</span>
        </button>
        <button class="cbtn cbtn-secondary" id="btnBackCover">
          <span>← 返 回</span>
        </button>
      </div>
    </div>
  </div>

  <!-- 左上角角色切换 -->
  <div class="char-switcher" id="charSwitcher">
    <button class="avatar-btn" id="avatarBtn" title="切换英雄">
      <svg id="currentAvatarSvg" viewBox="0 0 40 40"></svg>
    </button>
    <div class="char-panel hidden" id="charPanel">
      <div class="panel-title">选 择 英 雄</div>
      <div class="avatars">
        <button class="avatar-card naruto-bg" data-char="naruto">
          <svg viewBox="0 0 40 40">
            <polygon points="6,14 9,2 13,12 16,0 20,10 24,0 27,12 31,2 34,14" fill="#ffd91f"/>
            <circle cx="20" cy="24" r="12" fill="#ffd9a8"/>
            <rect x="8" y="14" width="24" height="5" fill="#2f55b8"/>
            <rect x="12" y="14.5" width="16" height="3.5" fill="#b8b8b8"/>
            <rect x="15" y="22" width="2" height="2" fill="#111"/>
            <rect x="23" y="22" width="2" height="2" fill="#111"/>
            <line x1="8" y1="26" x2="14" y2="26" stroke="#5a3a1a" stroke-width="1"/>
            <line x1="26" y1="26" x2="32" y2="26" stroke="#5a3a1a" stroke-width="1"/>
          </svg>
          <span>鸣 人</span>
        </button>

            <circle cx="20" cy="20" r="16" fill="#30a8e8"/>
            <ellipse cx="20" cy="22" rx="11" ry="10" fill="#fff"/>
            <ellipse cx="16.5" cy="15" rx="3" ry="4" fill="#fff" stroke="#111" stroke-width="0.8"/>
            <ellipse cx="23.5" cy="15" rx="3" ry="4" fill="#fff" stroke="#111" stroke-width="0.8"/>
            <circle cx="17.5" cy="16" r="1.3" fill="#111"/>
            <circle cx="22.5" cy="16" r="1.3" fill="#111"/>
            <circle cx="20" cy="20" r="2.5" fill="#e63946"/>
            <path d="M16 25 Q20 28 24 25" stroke="#111" fill="none" stroke-width="1.2"/>
            <line x1="7" y1="22" x2="14" y2="22" stroke="#111" stroke-width="1"/>
            <line x1="26" y1="22" x2="33" y2="22" stroke="#111" stroke-width="1"/>

    <div class="hpbar right"><div class="fill" id="hp2" style="width:100%"></div><div class="name"><span>木 桩</span><span class="hpnum" id="hpnum2">20000 / 20000</span></div></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const W = canvas.width, H = canvas.height;
const GROUND = 400;
const GRAVITY = 0.55;

// 角色选择（必须在 skills 之前定义）
let selectedChar = "naruto";
const skillConfigs = {
  naruto: [
    { name: "苦无",      key: "j", cd: 2000,  icon: "🔪" },
    { name: "色诱之术",  key: "k", cd: 6000,  icon: "💕" },
    { name: "螺旋丸",    key: "l", cd: 6000,  icon: "🌀" },
    { name: "影分身",    key: "u", cd: 12000, icon: "👥" },
  ],
  doraemon: [
    { name: "任意门",    key: "j", cd: 0,     icon: "🚪" },
    { name: "手电筒",    key: "k", cd: 3000,  icon: "🔦" },
    { name: "时空暂停",  key: "l", cd: 15000, icon: "⏸" },
    { name: "铜锣烧防御",key: "u", cd: 10000, icon: "🥮" },
  ],
};

const keys = {};
// P2 按键（箭头防滚动 + JKIL 技能）
addEventListener("keydown", e => {
  if (["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key)) e.preventDefault();
  if (e.key === "ArrowDown" && gameMode === "pvp" && !keys["arrowdown"]) handleP2Attack();
  if (gameMode === "pvp") {
    const k = e.key.toLowerCase();
    const idx = P2_SKILL_KEYS.indexOf(k);
    if (idx !== -1 && !keys[k]) handleP2SkillKey(idx);
  }
}, { capture: true });

function handleP2Attack() {
  if (matchEnded) return;
  if (p2.atkT > 0) return;
  if (p2.stunT > 0 || p2.downT > 0) return;
  if (performance.now() < timeFrozenUntil) return;
  if (p2.char === "doraemon") handleDoraemonAttack(p2);
  else handleNarutoAttack(p2);
}

function handleP2SkillKey(idx) {
  if (matchEnded || gameMode !== "pvp") return;
  if (performance.now() < timeFrozenUntil) return;
  const s = p2.skills[idx];
  if (!s) return;
  const now = performance.now();
  if (now < s.ready) return;
  s.ready = now + s.cd;
  castP2Skill(idx);
}

function castP2Skill(idx) {
  if (idx === 0) {
    // P2 任意门
    const offset = 80;
    const onLeft = p2.x < player.x;
    let toX = onLeft ? player.x + offset : player.x - offset;
    if (Math.abs(p2.x - toX) < 40) {
      toX = onLeft ? player.x - offset : player.x + offset;
    }
    toX = Math.max(40, Math.min(W - 40, toX));
    const fromX = p2.x;
    doors.push({ x: fromX, y: p2.y, bornAt: performance.now(), life: 400 });
    doors.push({ x: toX,   y: p2.y, bornAt: performance.now(), life: 400 });
    p2.x = toX;
    p2.facing = player.x > p2.x ? 1 : -1;
    p2.invincibleUntil = performance.now() + 500;
    spawnParticles(fromX, p2.y - 30, "#ff8cd9", 16);
    spawnParticles(toX, p2.y - 30, "#ff8cd9", 16);
    if (Math.random() < 0.05) {
      damagePlayer(200);
      hitStopT = Math.max(hitStopT, 5);
      shakeT = 14; shakeStrength = 8;
      damageTexts.push({
        x: player.x, y: player.y - 130,
        vx: 0, vy: -2.5, life: 70, maxLife: 70,
        text: "幸 运!", color: "#ff66bb", size: 32, crit: true,
      });
      for (let i = 0; i < 16; i++) {
        const a = (i / 16) * Math.PI * 2, v = 3 + Math.random() * 2;
        particles.push({
          x: player.x, y: player.y - 60,
          vx: Math.cos(a) * v, vy: Math.sin(a) * v - 1,
          life: 40, color: "#ff66bb", size: 4,
        });
      }
    }
  } else if (idx === 1) {
    // P2 手电筒（对 P1 造 DoT）
    p2.flashlightEnd = performance.now() + 2000;
    p2.flashlightLastTick = 0;
  } else if (idx === 2) {
    // P2 时空暂停：冻结 P1
    p1FrozenUntil = performance.now() + 3000;
    player.stunT = 180;
    spawnTimeStopFlash();
  } else if (idx === 3) {
    // P2 铜锣烧防御
    p2ShieldUntil = performance.now() + 5000;
    for (let i = 0; i < 20; i++) {
      const a = (i / 20) * Math.PI * 2;
      particles.push({
        x: p2.x + Math.cos(a) * 40,
        y: p2.y - 40 + Math.sin(a) * 40,
        vx: Math.cos(a) * 2, vy: Math.sin(a) * 2 - 1,
        life: 30, color: "#ffcc66", size: 4,
      });
    }
  }
}

addEventListener("keydown", e => {
  const k = e.key === " " ? "space" : e.key.toLowerCase();
  if (k === "space") e.preventDefault();
  const p1Blocked = matchEnded || performance.now() < p1FrozenUntil;
  if (!keys[k] && !p1Blocked) {
    if (k === "space") {
      if (inAerial()) fireManualAerialShot();
      else handleNormalAttack();
    } else {
      const p1Keys = currentP1Keys();
      const idx = p1Keys.indexOf(k);
      if (idx === 2 && selectedChar === "naruto") startRasenCharge();
      else if (idx !== -1) handleSkillIndex(idx);
    }
  }
  if (!p1Blocked) keys[k] = true;
});
addEventListener("keyup", e => {
  const k = e.key === " " ? "space" : e.key.toLowerCase();
  if (k === currentP1RasenKey()) releaseRasen();
  keys[k] = false;
});

const skills = skillConfigs.naruto.map(c => ({ ...c, ready: 0 }));

function applyCharacter(name) {
  selectedChar = name;
  const cfg = skillConfigs[name];
  // 更新 skills 数据
  skills.length = 0;
  cfg.forEach(c => skills.push({ ...c, ready: 0 }));
  // 更新技能栏 UI
  document.querySelectorAll(".skill").forEach((el, i) => {
    el.querySelector(".icon").textContent = cfg[i].icon;
    el.querySelector(".label").textContent = cfg[i].name;
  });
  // 清空战斗状态
  player.rasenCharging = false;
  player.rasenThrowT = 0;
  player.aerialStart = 0;
  player.sealT = 0;
  player.comboStage = 0;
  player.comboWindow = 0;
  player.spearT = 0;
  player.spinT = 0;
  player.spinLastTick = 0;
  player.punchRushT = 0;
  player.thunderT = 0;
  player.atkT = 0;
  player.atkType = 0;
  clones.length = 0;
  timeFrozenUntil = 0;
  shieldActiveUntil = 0;
}

const player = {
  x: 200, y: GROUND, vx: 0, vy: 0,
  w: 48, h: 80,
  facing: 1,
  hp: 10000, maxHp: 10000,
  onGround: true,
  slashT: 0,       // 雷电斩动画计时
  teleportT: 0,    // 瞬移残影计时
  teleportFromX: 0,
  atkT: 0,         // 平A 动画剩余帧
  atkType: 0,      // 当前平A段数 0=无 1/2/3
  atkHit: false,   // 本次平A是否已命中
  comboStage: 0,   // 下一段 0→1A 1→2A 2→3A
  comboWindow: 0,  // 连招窗口
  flipT: 0,        // 后翻旋转动画
  walkT: 0,        // 走路相位（随移动累积）
  landT: 0,        // 落地挤压计时
  wasOnGround: true,
  blinkT: 0,       // 眨眼计时
  rasenCharging: false,  // L 键按住中
  rasenChargeT: 0,       // 按住帧数
  rasenThrowT: 0,        // 投掷动作残留帧
  aerialStart: 0,        // 飞天开始的 performance.now() 时间戳（0=非飞天）
  aerialDuration: 5000,  // 飞天持续毫秒
  aerialShotsLeft: 0,    // 飞天中剩余发射次数
  sealT: 0,              // 影分身结印动画
  rasenDashT: 0,         // 螺旋丸前冲锁定帧
  flashlightEnd: 0,      // 哆啦A梦手电筒持续至时刻
  flashlightLastTick: 0, // 上次伤害 tick 时间戳
  invincibleUntil: 0,    // 无敌帧结束时刻
  spearT: 0,             // 1A 石矛突进
  spinT: 0,              // 2A 回旋
  spinLastTick: 0,       // 2A 持续伤害的 tick 时间戳
  punchRushT: 0,         // 3A / 5A 小拳拳冲锋
  thunderT: 0,           // 4A 电击枪
};

const LONG_PRESS_THRESHOLD = 20; // 超过即进入飞天模式

function inAerial() {
  return player.aerialStart > 0 && (performance.now() - player.aerialStart) < player.aerialDuration;
}

// 对手（未来玩家2）是否被时空暂停——PVP 时在对手 keydown 和 update 里判断
function isOpponentFrozen() {
  return performance.now() < timeFrozenUntil;
}

// 铜锣烧盾激活中
function isShieldActive() {
  return performance.now() < shieldActiveUntil;
}

// 对玩家造成伤害（为 PVP 预留统一入口）——无敌 / 盾减伤 90% 都在这里处理
function damagePlayer(amount) {
  if (matchEnded) return 0;
  if (performance.now() < player.invincibleUntil) return 0;
  let final = amount;
  if (isShieldActive()) {
    final = Math.max(1, Math.ceil(amount * 0.1)); // 减 90%
    spawnHitImpact(player.x, player.y - 60, 30);
    // 减伤飘字（绿色提示抵挡成功）
    damageTexts.push({
      x: player.x, y: player.y - 90,
      vx: (Math.random() - 0.5) * 2, vy: -3,
      life: 45, maxLife: 45,
      text: "-90%",
      color: "#66ff99",
      size: 20,
      crit: false,
    });
  }
  player.hp = Math.max(0, player.hp - final);
  // 伤害飘字 + 受击粒子
  spawnDamageText(player.x + (Math.random() - 0.5) * 30, player.y - 90, final);
  spawnParticles(player.x, player.y - 50, "#f55", 14);
  player.hitFlash = 10;
  document.getElementById("hp1").style.width = (player.hp / player.maxHp * 100) + "%";
  document.getElementById("hpnum1").textContent = `${player.hp} / ${player.maxHp}`;
  if (player.hp === 0) checkMatchEnd();
  return final;
}

// 游戏模式
let gameMode = "training"; // "training" | "pvp"

// 木桩（训练模式目标）
const baseDummy = {
  isDummy: true,
  x: 760, y: GROUND, w: 60, h: 90,
  hp: 20000, maxHp: 20000,
  hitFlash: 0,
  shakeT: 0,
  stunT: 0,
  downT: 0,
  cdPenalty: 0,
};

// 玩家 2（PVP 对战对象）
const p2 = {
  isDummy: false,
  char: "doraemon",
  x: 760, y: GROUND, vx: 0, vy: 0,
  w: 60, h: 90,
  facing: -1,
  hp: 10000, maxHp: 10000,
  onGround: true,
  wasOnGround: true,
  walkT: 0, landT: 0, blinkT: 90, flipT: 0,
  atkT: 0, atkType: 0, atkHit: false,
  comboStage: 0, comboWindow: 0,
  hitFlash: 0, shakeT: 0, stunT: 0, downT: 0, cdPenalty: 0,
  invincibleUntil: 0,
  skills: [],
  flashlightEnd: 0, flashlightLastTick: 0,
  // 完整平A连招状态（与 player 对齐）
  spearT: 0, spinT: 0, spinLastTick: 0,
  punchRushT: 0, thunderT: 0, rasenDashT: 0,
  // 占位
  rasenCharging: false, rasenThrowT: 0, sealT: 0,
  aerialStart: 0,
};

// dummy 是共用引用，训练=baseDummy / PVP=p2
let dummy = baseDummy;

const projectiles = []; // 手里剑
const clones = [];      // 分身
const particles = [];   // 粒子特效
const damageTexts = []; // 飘字伤害
const rasenBalls = [];  // 螺旋丸飞行体
const fogClouds = [];   // 色诱之术云雾区

// 打击感全局
let hitStopT = 0;       // 命中冻结帧
let shakeT = 0;         // 屏幕抖动剩余帧
let shakeStrength = 0;  // 抖动强度

// 哆啦A梦专属状态
let timeFrozenUntil = 0;    // P1 冻结 P2 的结束时刻
let p1FrozenUntil = 0;      // P2 冻结 P1 的结束时刻（PVP）
let shieldActiveUntil = 0;  // P1 盾
let p2ShieldUntil = 0;      // P2 盾
const doors = [];           // 任意门特效

// 胜负（三局两胜）
let matchEnded = false;     // 当局结束
let winner = null;          // 本局胜者 "p1" / "p2"
let p1Wins = 0;
let p2Wins = 0;
const WINS_TO_WIN = 2;
let roundTimeoutId = null;  // 局间过渡定时器

function handleNormalAttack() {
  if (player.atkT > 0) return;
  if (inAerial()) return;
  if (selectedChar === "doraemon") handleDoraemonAttack(player);
  else handleNarutoAttack(player);
}

function handleNarutoAttack(e = player) {
  const stage = e.comboStage;
  e.atkType = stage + 1;
  e.atkHit = false;
  e.comboWindow = 36;
  if (stage === 0) {
    e.atkT = 18;
    e.x += e.facing * 60;
  } else if (stage === 1) {
    e.atkT = 22;
  } else {
    e.atkT = 26;
    e.flipT = 22;
    e.x -= e.facing * 80;
    projectiles.push({
      x: e.x + e.facing * 30,
      y: e.y - 50,
      vx: e.facing * 10,
      life: 70,
      rot: 0,
      small: true,
      damage: 500,
    });
    spawnParticles(e.x, e.y - 40, "#9df", 10);
  }
  e.x = Math.max(40, Math.min(W - 40, e.x));
  e.comboStage = (stage + 1) % 3;
  if (e === player) {
    updateComboIndicator();
    clones.forEach(c => triggerCloneAttack(c, stage + 1));
  }
}

function applyDamageTo(target, amount) {
  if (target === player) damagePlayer(amount);
  else damageDummy(amount);
}

// 统一战斗管线：命中/tick 伤害/动作计时 全部由 attacker+target 驱动
function updateEntityCombat(attacker, target, char) {
  // 一次性命中（1A / 4A / 鸣人三段）
  if (attacker.atkT > 0 && !attacker.atkHit) {
    const dx = target.x - attacker.x;
    const sameSide = Math.sign(dx) === attacker.facing;
    let hit = false, dmg = 0;
    if (char === "naruto") {
      if (attacker.atkType === 1 && Math.abs(dx) < 110 && sameSide) { dmg = 500; hit = true; }
      else if (attacker.atkType === 2 && Math.abs(dx) < 110 && sameSide) { dmg = 800; hit = true; target.shakeT = 18; }
      else if (attacker.atkType === 3 && Math.abs(dx) < 100) { dmg = 700; hit = true; }
    } else if (char === "doraemon") {
      if (attacker.atkType === 1 && Math.abs(dx) < 180 && sameSide) { dmg = 600; hit = true; }
      else if (attacker.atkType === 4 && Math.abs(dx) < W / 2 && sameSide) {
        dmg = 1000; hit = true;
        target.downT = Math.max(target.downT || 0, 30);
      }
    }
    if (hit) {
      applyDamageTo(target, dmg);
      attacker.atkHit = true;
      hitStopT = Math.max(hitStopT, 4);
      shakeT = 12;
      shakeStrength = (attacker.atkType === 2 || attacker.atkType === 4) ? 9 : 6;
      spawnHitImpact(target.x - attacker.facing * 20, target.y - 60, 44);
    }
  }

  // 2A 回旋 tick 伤害（每 20ms 20 点）
  if (char === "doraemon" && attacker.spinT > 0) {
    const dx2 = target.x - attacker.x;
    if (Math.abs(dx2) < 170) {
      if (!attacker.atkHit) {
        target.stunT = Math.max(target.stunT || 0, 120);
        attacker.atkHit = true;
        hitStopT = Math.max(hitStopT, 4);
        shakeT = 12; shakeStrength = 8;
        spawnHitImpact(target.x, target.y - 60, 44);
      }
      const nowTick = performance.now();
      if (nowTick - (attacker.spinLastTick || 0) >= 20) {
        applyDamageTo(target, 20);
        attacker.spinLastTick = nowTick;
      }
    }
  }

  // 小拳拳冲锋（3A / 5A）
  if (char === "doraemon" && attacker.punchRushT > 0) {
    attacker.punchRushT--;
    attacker.x += attacker.facing * 2.6;
    attacker.x = Math.max(40, Math.min(W - 40, attacker.x));
    const dx3 = target.x - attacker.x;
    const inReach = Math.sign(dx3) === attacker.facing && Math.abs(dx3) < 150;
    if (inReach) {
      target.x += attacker.facing * 2.2;
      target.x = Math.max(100, Math.min(W - 100, target.x));
      if (attacker.punchRushT % 6 === 0) {
        applyDamageTo(target, 120);
        hitStopT = Math.max(hitStopT, 2);
        shakeT = 6; shakeStrength = 4;
        spawnHitImpact(target.x - attacker.facing * 24, target.y - 60 + (Math.random() - 0.5) * 30, 30);
      }
    }
  }

  // 4A 电击枪 tick（持续命中视觉反馈）
  if (char === "doraemon" && attacker.thunderT > 0) {
    attacker.thunderT--;
    if (attacker.thunderT > 24 && attacker.thunderT % 4 === 0) {
      const dxT = target.x - attacker.x;
      if (Math.sign(dxT) === attacker.facing && Math.abs(dxT) < W / 2) target.shakeT = 10;
    }
  }

  // 计时器衰减
  if (attacker.atkT > 0) attacker.atkT--;
  if (attacker.atkT === 0 && attacker.atkType !== 0) attacker.atkType = 0;
  if (attacker.spearT > 0) attacker.spearT--;
  if (attacker.spinT  > 0) attacker.spinT--;
  if (attacker.flipT  > 0) attacker.flipT--;

  // 连招窗口
  if (attacker.comboWindow > 0) {
    attacker.comboWindow--;
    if (attacker.comboWindow === 0) {
      attacker.comboStage = 0;
      if (attacker === player) updateComboIndicator();
    }
  }
}

function handleDoraemonAttack(e = player) {
  const stage = e.comboStage;
  e.atkType = stage + 1;
  e.atkHit = false;
  const target = (e === player) ? dummy : player;

  if (stage === 0) {
    e.atkT = 24;
    e.spearT = 24;
    e.x += e.facing * 100;
  } else if (stage === 1) {
    e.atkT = 28;
    e.spinT = 28;
    e.spearT = 28;
  } else if (stage === 2) {
    e.atkT = 48;
    e.punchRushT = 48;
  } else if (stage === 3) {
    e.atkT = 30;
    e.thunderT = 30;
  } else {
    const offset = 80;
    const fromX = e.x;
    const behindX = e.x < target.x ? target.x + offset : target.x - offset;
    const newX = Math.max(40, Math.min(W - 40, behindX));
    doors.push({ x: fromX, y: e.y, bornAt: performance.now(), life: 400 });
    doors.push({ x: newX, y: e.y, bornAt: performance.now(), life: 400 });
    e.x = newX;
    e.facing = target.x > e.x ? 1 : -1;
    e.invincibleUntil = performance.now() + 400;
    spawnParticles(fromX, e.y - 30, "#ff8cd9", 12);
    spawnParticles(newX,  e.y - 30, "#ff8cd9", 12);
    e.atkT = 48;
    e.punchRushT = 48;
  }

  e.x = Math.max(40, Math.min(W - 40, e.x));
  e.comboStage = (stage + 1) % 5;
  e.comboWindow = 54;
  if (e === player) updateComboIndicator();
}

function updateComboIndicator() {
  const el = document.getElementById("combo-indicator");
  const next = player.comboStage;
  const narutoNames = ["1A 突刺", "2A 上勾", "3A 后翻"];
  const doraNames   = ["1A 石矛", "2A 回旋", "3A 小拳拳", "4A 电击枪", "5A 穿门连击"];
  const names = selectedChar === "doraemon" ? doraNames : narutoNames;
  if (player.comboWindow > 0 && next > 0) {
    el.innerHTML = `连招：下一段 <b style="color:#fff">${names[next]}</b>`;
  } else {
    el.innerHTML = "";
  }
}

function handleSkillKey(k) {
  const idx = skills.findIndex(s => s.key === k);
  handleSkillIndex(idx);
}

function handleSkillIndex(idx) {
  if (idx < 0 || idx >= skills.length) return;
  const s = skills[idx];
  const now = performance.now();
  if (now < s.ready) {
    flashSkill(idx, false);
    return;
  }
  s.ready = now + s.cd;
  flashSkill(idx, true);
  castSkill(idx);
}

function castSkill(idx) {
  if (selectedChar === "doraemon") {

    return;
  }
  if (idx === 0) {
    // 苦无（正统飞镖）
    projectiles.push({
      x: player.x + player.facing * 30,
      y: player.y - 50,
      vx: player.facing * 12,
      life: 80,
      rot: 0,
      damage: 1000,
    });
    spawnParticles(player.x + player.facing * 30, player.y - 50, "#7cf", 6);
    // 影分身同步甩苦无（50% 伤害）
    clones.forEach(c => {
      projectiles.push({
        x: c.x + c.facing * 30,
        y: c.y - 50,
        vx: c.facing * 12,
        life: 80,
        rot: 0,
        damage: 500,
      });
    });
  } else if (idx === 1) {
    // 色诱之术：本体和影分身各放一团粉色云雾 2 秒
    const casters = [{ x: player.x, y: player.y - 40 }];
    clones.forEach(c => casters.push({ x: c.x, y: c.y - 40 }));
    casters.forEach(({x: cx, y: cy}) => {
      fogClouds.push({
        x: cx, y: cy,
        radius: 60,
        maxRadius: 120,
        life: 120,
        maxLife: 120,
        hit: new Set(),
      });
      for (let i = 0; i < 24; i++) {
        const ang = Math.random() * Math.PI * 2;
        const dist = Math.random() * 60;
        particles.push({
          x: cx + Math.cos(ang) * dist,
          y: cy + Math.sin(ang) * dist * 0.6,
          vx: Math.cos(ang) * 1.5,
          vy: Math.sin(ang) * 0.8 - 0.5,
          life: 40 + Math.random() * 20,
          color: "#ffaacc",
          size: 10 + Math.random() * 8,
          smoke: true,
        });
      }
    });
  } else if (idx === 2) {
    // 螺旋丸由 L 键独立处理（startRasenCharge / releaseRasen）
  } else if (idx === 3) {
    // 影分身：先结印，两侧各生成一个，持续 5 秒
    player.sealT = 24;
    setTimeout(() => {
      [-1, 1].forEach(side => {
        const cx = player.x + side * 70;
        const cy = player.y;
        clones.push({
          side,
          x: cx, y: cy,
          facing: player.facing,
          spawnTime: performance.now(),
          lifeMs: 5000,
          spawnT: 18,
          atkT: 0,
          atkType: 0,
          atkHit: false,
          rasenThrowT: 0,
          walkT: 0,
          vx: 0,
          onGround: true,
          blinkT: Math.floor(Math.random() * 180),
          landT: 0,
          flipT: 0,
          sealT: 0,
          rasenCharging: false,
        });
        spawnSmoke(cx, cy - 40, 16);
      });
    }, 280);
  }
}

function computeAerialShotVel() {
  // 根据水平速度倾斜射击方向
  const tilt = Math.max(-0.7, Math.min(0.7, player.vx * 0.18));
  const v = 9;
  return {
    vx: Math.sin(tilt) * v,
    vy: Math.cos(tilt) * v + 2,
  };
}

function fireManualAerialShot() {
  if (!inAerial() || player.aerialShotsLeft <= 0) return;
  player.aerialShotsLeft--;
  const { vx, vy } = computeAerialShotVel();
  rasenBalls.push({
    x: player.x + player.facing * 10,
    y: player.y - 30,
    vx, vy,
    size: 10,
    travel: 0,
    maxTravel: 620,
    scale: 1,
  });
  spawnParticles(player.x, player.y - 30, "#4cf", 12);
}

function drawRasenOrb(x, y, radius) {
  const grad = ctx.createRadialGradient(x, y, 2, x, y, radius * 2);
  grad.addColorStop(0, "rgba(220,245,255,1)");
  grad.addColorStop(0.4, "rgba(80,180,255,0.8)");
  grad.addColorStop(1, "rgba(30,100,220,0)");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, radius * 2, 0, Math.PI * 2);
  ctx.fill();
  // 内核
  ctx.fillStyle = "#fff";
  ctx.beginPath();
  ctx.arc(x, y, Math.max(3, radius * 0.35), 0, Math.PI * 2);
  ctx.fill();
  // 螺旋
  ctx.strokeStyle = "rgba(255,255,255,0.75)";
  ctx.lineWidth = 2;
  for (let k = 0; k < 3; k++) {
    ctx.beginPath();
    for (let a = 0; a < Math.PI * 3; a += 0.15) {
      const r = (a / (Math.PI * 3)) * radius;
      const ang = a + performance.now() / 50 + k * 2.1;
      const px = x + Math.cos(ang) * r;
      const py = y + Math.sin(ang) * r;
      if (a === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
  }
}

function castDoraemonSkill(idx) {
  if (idx === 0) {
    // 任意门：无 CD，瞬移到敌方身后（或另一侧），全程 500ms 无敌
    const fromX = player.x;
    const offset = 80;
    const playerOnLeft = player.x < dummy.x;
    // 默认"身后" = 玩家对面那一侧（相对敌人）
    let toX = playerOnLeft ? dummy.x + offset : dummy.x - offset;
    // 如果玩家已经在身后，改到敌人另一侧（身前）
    if (Math.abs(player.x - toX) < 40) {
      toX = playerOnLeft ? dummy.x - offset : dummy.x + offset;
    }
    toX = Math.max(40, Math.min(W - 40, toX));
    // 双门瞬时出现 + 立即瞬移
    doors.push({ x: fromX, y: player.y, bornAt: performance.now(), life: 400 });
    doors.push({ x: toX,   y: player.y, bornAt: performance.now(), life: 400 });
    player.x = toX;
    player.facing = dummy.x > toX ? 1 : -1;
    player.invincibleUntil = performance.now() + 500;
    spawnParticles(fromX, player.y - 30, "#ff8cd9", 16);
    spawnParticles(toX,   player.y - 30, "#ff8cd9", 16);
    // 5% 概率触发"幸运一击" 200 伤害
    if (Math.random() < 0.05) {
      damageDummy(200);
      spawnHitImpact(dummy.x, dummy.y - 60, 60);
      hitStopT = Math.max(hitStopT, 5);
      shakeT = 14;
      shakeStrength = 8;
      // 粉色"幸运!"飘字
      damageTexts.push({
        x: dummy.x,
        y: dummy.y - 130,
        vx: 0,
        vy: -2.5,
        life: 70,
        maxLife: 70,
        text: "幸 运!",
        color: "#ff66bb",
        size: 32,
        crit: true,
      });
      // 爱心粒子放射
      for (let i = 0; i < 16; i++) {
        const a = (i / 16) * Math.PI * 2;
        const v = 3 + Math.random() * 2;
        particles.push({
          x: dummy.x,
          y: dummy.y - 60,
          vx: Math.cos(a) * v,
          vy: Math.sin(a) * v - 1,
          life: 40,
          color: "#ff66bb",
          size: 4,
        });
      }
    }
  } else if (idx === 1) {
    // 手电筒：持续 2 秒光束，每 20ms 对命中目标造成 40 伤害并使其倒地
    player.flashlightEnd = performance.now() + 2000;
    player.flashlightLastTick = 0;
  } else if (idx === 2) {
    // 时空暂停：对方冻结 3s，背景灰化，对手禁动作
    timeFrozenUntil = performance.now() + 3000;
    dummy.stunT = 180;
    spawnTimeStopFlash();
  } else if (idx === 3) {
    // 铜锣烧防御：金色盾 5s
    shieldActiveUntil = performance.now() + 5000;
    // 粒子环
    for (let i = 0; i < 20; i++) {
      const a = (i / 20) * Math.PI * 2;
      particles.push({
        x: player.x + Math.cos(a) * 40,
        y: player.y - 40 + Math.sin(a) * 40,
        vx: Math.cos(a) * 2,
        vy: Math.sin(a) * 2 - 1,
        life: 30,
        color: "#ffcc66",
        size: 4,
      });
    }
  }
}

function drawDoraemon(state, attacking, tint) {
  state = state || player;
  const x = state.x, y = state.y, facing = state.facing;
  const isSelf = state === player;
  const moving = Math.abs(state.vx || 0) > 0.15 && state.onGround !== false && !attacking;
  const jumping = state.onGround === false && !attacking;
  const walkT = state.walkT || 0;
  const landT = state.landT || 0;
  const blinking = (state.blinkT || 0) < 6;
  const now = performance.now();

  ctx.save();
  ctx.translate(x, y);
  if (landT > 0) {
    const k = landT / 8;
    ctx.scale(1 + k * 0.15, 1 - k * 0.2);
  }
  ctx.scale(facing, 1);

  const blue     = tint || "#30a8e8";
  const blueDark = tint || "#1d7db8";
  const white    = "#ffffff";
  const red      = "#e63946";
  const yellow   = "#ffd91f";
  const black    = "#1a1a1a";
  const pink     = "#ff8cd9";

  // 呼吸/走路偏移
  const idleBob = Math.sin(now / 500) * 1;
  const walkBob = moving ? Math.abs(Math.sin(walkT * 2)) * 2 : 0;
  const bodyY = moving ? -walkBob : idleBob;

  // 腿摆动
  const legSwing = moving ? Math.sin(walkT) * 0.4 : 0;

  // ===== 腿 =====
  function drawFoot(hipX, angle, jumpBent) {
    ctx.save();
    ctx.translate(hipX, -8 + bodyY);
    ctx.rotate(jumpBent || angle);
    ctx.fillStyle = blue;
    ctx.fillRect(-5, 0, 10, 8);
    // 白色脚底
    ctx.fillStyle = white;
    ctx.beginPath();
    ctx.ellipse(0, 9, 7, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  if (jumping) {
    drawFoot(-7, 0, -0.5);
    drawFoot(7, 0, -0.3);
  } else {
    drawFoot(-7, legSwing, 0);
    drawFoot(7, -legSwing, 0);
  }

  // ===== 身体（蓝色圆胖） =====
  ctx.save();
  ctx.translate(0, bodyY);

  ctx.fillStyle = blue;
  ctx.beginPath();
  ctx.ellipse(0, -26, 18, 22, 0, 0, Math.PI * 2);
  ctx.fill();

  // 白肚皮
  ctx.fillStyle = white;
  ctx.beginPath();
  ctx.ellipse(0, -22, 12, 16, 0, 0, Math.PI * 2);
  ctx.fill();

  // 四次元口袋（肚子中央）
  ctx.fillStyle = white;
  ctx.beginPath();
  ctx.arc(0, -18, 7, 0, Math.PI);
  ctx.fill();
  ctx.strokeStyle = blueDark;
  ctx.lineWidth = 1;
  ctx.stroke();

  // 红项圈
  ctx.fillStyle = red;
  ctx.fillRect(-16, -48, 32, 4);
  // 黄铃铛（挂在脖子正前方）
  ctx.fillStyle = yellow;
  ctx.beginPath();
  ctx.arc(0, -43, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = black;
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(-2, -44); ctx.lineTo(2, -44);
  ctx.moveTo(0, -43); ctx.lineTo(0, -40);
  ctx.stroke();

  // ===== 头（大圆蓝） =====
  ctx.fillStyle = blue;
  ctx.beginPath();
  ctx.arc(0, -66, 20, 0, Math.PI * 2);
  ctx.fill();

  // 脸（白，标志性圆脸）
  ctx.fillStyle = white;
  ctx.beginPath();
  ctx.ellipse(0, -62, 13, 12, 0, 0, Math.PI * 2);
  ctx.fill();

  // 眼睛（两只大眼珠，微微斗鸡眼超萌）
  if (blinking) {
    ctx.strokeStyle = black;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-6, -74); ctx.lineTo(-2, -74);
    ctx.moveTo(2, -74); ctx.lineTo(6, -74);
    ctx.stroke();
  } else {
    ctx.fillStyle = white;
    ctx.strokeStyle = black;
    ctx.lineWidth = 1.2;
    // 后眼（稍小，表示 3/4）
    ctx.beginPath();
    ctx.ellipse(-3.5, -74, 3.5, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // 前眼
    ctx.beginPath();
    ctx.ellipse(3.5, -74, 4, 5.2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // 瞳孔（都往中间看）
    ctx.fillStyle = black;
    ctx.beginPath();
    ctx.arc(-2, -74, 1.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(2.2, -74, 1.4, 0, Math.PI * 2);
    ctx.fill();
  }

  // 红鼻（居中大圆）
  ctx.fillStyle = red;
  ctx.beginPath();
  ctx.arc(0, -66, 3.4, 0, Math.PI * 2);
  ctx.fill();
  // 高光
  ctx.fillStyle = "#ffb0b0";
  ctx.beginPath();
  ctx.arc(-1, -67, 1.1, 0, Math.PI * 2);
  ctx.fill();

  // 鼻→嘴纵线
  ctx.strokeStyle = black;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, -63); ctx.lineTo(0, -58);
  ctx.stroke();

  // 嘴（大大的笑）
  ctx.lineWidth = 1.5;
  if (attacking) {
    ctx.fillStyle = "#7a1a1a";
    ctx.beginPath();
    ctx.arc(0, -56, 4, 0, Math.PI);
    ctx.fill();
    ctx.strokeStyle = black;
    ctx.stroke();
  } else {
    ctx.strokeStyle = black;
    ctx.beginPath();
    ctx.arc(0, -56, 5, 0.25, Math.PI - 0.25);
    ctx.stroke();
  }

  // 胡须（两边各 3 根）
  ctx.strokeStyle = black;
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let i = 0; i < 3; i++) {
    const yy = -65 + i * 3;
    ctx.moveTo(5, yy);  ctx.lineTo(15,  yy - (i - 1) * 1.5);
    ctx.moveTo(-5, yy); ctx.lineTo(-15, yy - (i - 1) * 1.5);
  }
  ctx.stroke();

  // ===== 手臂（圆短） =====
  const armSwing = moving ? Math.sin(walkT) * 8 : 0;
  // 后手
  ctx.fillStyle = blue;
  ctx.beginPath();
  ctx.arc(-14, -34 - armSwing, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = white;
  ctx.beginPath();
  ctx.arc(-18, -30 - armSwing, 4, 0, Math.PI * 2);
  ctx.fill();

  // 前手（攻击时伸长）
  if (attacking) {
    ctx.fillStyle = blue;
    ctx.beginPath();
    ctx.arc(14, -36, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = white;
    ctx.beginPath();
    ctx.arc(24, -36, 5, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.fillStyle = blue;
    ctx.beginPath();
    ctx.arc(14, -34 + armSwing, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = white;
    ctx.beginPath();
    ctx.arc(18, -30 + armSwing, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
  ctx.restore();
}
